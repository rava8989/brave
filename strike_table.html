h1 { text-align:center; color:#58a6ff; font-size:20px; margin-bottom:18px; letter-spacing:1px; }

.day-header .window { color:#8b949e; font-size:13px; font-weight:400; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { background:#161b22; color:#8b949e; text-align:right; padding:5px 10px; border-bottom:2px solid #30363d; font-weight:600; text-transform:uppercase; font-size:11px; letter-spacing:0.5px; }

tbody tr:hover { background:#161b22; }
.positive { color:#3fb950; }
.negative { color:#f85149; }
.neutral { color:#8b949e; }
.win-high { color:#3fb950; font-weight:700; }
.win-mid { color:#d29922; }
.win-low { color:#f85149; }
tfoot td { border-top:2px solid #30363d; font-weight:700; color:#f0f6fc; padding:6px 10px; background:#161b22; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
.full-width { grid-column: 1 / -1; }
@media (max-width:900px) { .grid { grid-template-columns:1fr; } }
.summary-row { display:flex; justify-content:center; gap:40px; margin-bottom:20px; }
.summary-item { text-align:center; }
.summary-item .val { font-size:22px; font-weight:700; color:#3fb950; }
.summary-item .lbl { font-size:11px; color:#8b949e; text-transform:uppercase; letter-spacing:1px; }
</style>
</head>
<body>
<h1>M8BF BUTTERFLY — STRIKE ENDING ANALYSIS (FULL WEEK)</h1>

  <div class="summary-item"><div class="val" id="sumAvg">—</div><div class="lbl">Avg P/L</div></div>
</div>
<div class="grid" id="tables"></div>

<script>

const DOW_NAMES = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY'];
const M8BF_WIN_LABELS = {0:'11:00 – 11:30',1:'13:30 – 14:00',2:'12:00 – 12:30',3:'11:00 – 11:30',4:'13:00 – 13:30'};

// Data will be injected by Node script
const DATA = {"0":[{"last2":5,"wins":12,"totalPL":14944,"trades":17,"winPct":71},{"last2":20,"wins":2,"totalPL":-210,"trades":3,"winPct":67},{"last2":30,"wins":1,"totalPL":359,"trades":1,"winPct":100},{"last2":45,"wins":7,"totalPL":766,"trades":11,"winPct":64},{"last2":55,"wins":8,"totalPL":3798,"trades":13,"winPct":62},{"last2":60,"wins":0,"totalPL":-224,"trades":1,"winPct":0},{"last2":70,"wins":2,"totalPL":1123,"trades":2,"winPct":100},{"last2":75,"wins":2,"totalPL":-1769,"trades":5,"winPct":40},{"last2":85,"wins":0,"totalPL":-500,"trades":1,"winPct":0},{"last2":95,"wins":5,"totalPL":842,"trades":10,"winPct":50}],"1":[{"last2":0,"wins":2,"totalPL":2499,"trades":3,"winPct":67},{"last2":5,"wins":14,"totalPL":9874,"trades":20,"winPct":70},{"last2":15,"wins":0,"totalPL":-39,"trades":1,"winPct":0},{"last2":20,"wins":1,"totalPL":411,"trades":1,"winPct":100},{"last2":30,"wins":0,"totalPL":-467,"trades":1,"winPct":0},{"last2":45,"wins":10,"totalPL":4151,"trades":14,"winPct":71},{"last2":50,"wins":1,"totalPL":-875,"trades":2,"winPct":50},{"last2":55,"wins":6,"totalPL":3870,"trades":11,"winPct":55},{"last2":70,"wins":2,"totalPL":1688,"trades":3,"winPct":67},{"last2":75,"wins":3,"totalPL":964,"trades":4,"winPct":75},{"last2":85,"wins":2,"totalPL":1425,"trades":3,"winPct":67},{"last2":90,"wins":1,"totalPL":-1567,"trades":2,"winPct":50},{"last2":95,"wins":4,"totalPL":3584,"trades":6,"winPct":67}],"2":[{"last2":5,"wins":7,"totalPL":-92,"trades":12,"winPct":58},{"last2":15,"wins":0,"totalPL":-468,"trades":2,"winPct":0},{"last2":20,"wins":4,"totalPL":1812,"trades":5,"winPct":80},{"last2":30,"wins":3,"totalPL":3167,"trades":3,"winPct":100},{"last2":45,"wins":10,"totalPL":10663,"trades":14,"winPct":71},{"last2":50,"wins":3,"totalPL":2866,"trades":4,"winPct":75},{"last2":55,"wins":2,"totalPL":-2674,"trades":6,"winPct":33},{"last2":60,"wins":1,"totalPL":1480,"trades":1,"winPct":100},{"last2":70,"wins":3,"totalPL":1189,"trades":6,"winPct":50},{"last2":75,"wins":0,"totalPL":-15,"trades":1,"winPct":0},{"last2":95,"wins":10,"totalPL":5909,"trades":18,"winPct":56}],"3":[{"last2":5,"wins":9,"totalPL":1249,"trades":15,"winPct":60},{"last2":15,"wins":1,"totalPL":1627,"trades":2,"winPct":50},{"last2":20,"wins":1,"totalPL":917,"trades":1,"winPct":100},{"last2":45,"wins":9,"totalPL":9547,"trades":10,"winPct":90},{"last2":50,"wins":0,"totalPL":-74,"trades":1,"winPct":0},{"last2":55,"wins":5,"totalPL":3355,"trades":8,"winPct":62},{"last2":60,"wins":1,"totalPL":762,"trades":1,"winPct":100},{"last2":70,"wins":1,"totalPL":114,"trades":1,"winPct":100},{"last2":75,"wins":2,"totalPL":1879,"trades":2,"winPct":100},{"last2":85,"wins":2,"totalPL":2444,"trades":2,"winPct":100},{"last2":90,"wins":2,"totalPL":548,"trades":4,"winPct":50},{"last2":95,"wins":5,"totalPL":3768,"trades":9,"winPct":56}],"4":[{"last2":5,"wins":9,"totalPL":4667,"trades":14,"winPct":64},{"last2":30,"wins":1,"totalPL":743,"trades":1,"winPct":100},{"last2":45,"wins":9,"totalPL":2416,"trades":19,"winPct":47},{"last2":50,"wins":1,"totalPL":183,"trades":2,"winPct":50},{"last2":55,"wins":8,"totalPL":5546,"trades":13,"winPct":62},{"last2":70,"wins":1,"totalPL":1241,"trades":1,"winPct":100},{"last2":75,"wins":2,"totalPL":1510,"trades":2,"winPct":100},{"last2":85,"wins":2,"totalPL":1005,"trades":2,"winPct":100},{"last2":95,"wins":9,"totalPL":6641,"trades":11,"winPct":82}]};

function fmt$(v) {
  if (v === 0) return '<span class="neutral">$0</span>';
  const cls = v > 0 ? 'positive' : 'negative';
  const sign = v > 0 ? '+' : '';
  return `<span class="${cls}">${sign}$${v.toLocaleString()}</span>`;
}
function fmtWin(pct) {
  const cls = pct >= 70 ? 'win-high' : pct >= 55 ? 'win-mid' : 'win-low';
  return `<span class="${cls}">${pct}%</span>`;
}

function buildTable(dayData, dow) {
  const sec = document.createElement('div');
  sec.className = 'day-section';
  sec.innerHTML = `<div class="day-header"><span>${DOW_NAMES[dow]}</span><span class="window">${M8BF_WIN_LABELS[dow]}</span></div>`;

  let html = `<table><thead><tr><th>Last2</th><th>Win %</th><th>Avg P/L</th><th>Total P/L</th><th>Trades</th></tr></thead><tbody>`;

  let totalPL = 0, totalTrades = 0, totalWins = 0;
  for (const row of dayData) {
    const avgPL = row.trades > 0 ? Math.round(row.totalPL / row.trades) : 0;
    html += `<tr>
      <td>${String(row.last2).padStart(2,'0')}</td>
      <td>${fmtWin(row.winPct)}</td>
      <td>${fmt$(avgPL)}</td>
      <td>${fmt$(row.totalPL)}</td>
      <td>${row.trades}</td>
    </tr>`;
    totalPL += row.totalPL;
    totalTrades += row.trades;
    totalWins += row.wins;
  }
  const totalWinPct = totalTrades > 0 ? Math.round(totalWins / totalTrades * 100) : 0;
  const totalAvg = totalTrades > 0 ? Math.round(totalPL / totalTrades) : 0;
  html += `</tbody><tfoot><tr>
    <td>ALL</td><td>${fmtWin(totalWinPct)}</td><td>${fmt$(totalAvg)}</td><td>${fmt$(totalPL)}</td><td>${totalTrades}</td>
  </tr></tfoot></table>`;

  sec.innerHTML += html;
  return sec;
}

function render() {
  if (!DATA) return;
  const container = document.getElementById('tables');
  let grandPL = 0, grandTrades = 0, grandWins = 0;

  for (let dow = 0; dow < 5; dow++) {
    const dayData = DATA[dow] || [];
    container.appendChild(buildTable(dayData, dow));
    for (const r of dayData) { grandPL += r.totalPL; grandTrades += r.trades; grandWins += r.wins; }
  }

  document.getElementById('sumTrades').textContent = grandTrades;
  document.getElementById('sumWin').textContent = (grandTrades > 0 ? Math.round(grandWins/grandTrades*100) : 0) + '%';
  document.getElementById('sumPL').textContent = '$' + grandPL.toLocaleString();
  document.getElementById('sumPL').className = grandPL >= 0 ? 'val positive' : 'val negative';
  document.getElementById('sumAvg').textContent = '$' + (grandTrades > 0 ? Math.round(grandPL/grandTrades) : 0).toLocaleString();
}
render();
</script>
</body>
