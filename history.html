<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Σ3 — Historical Signals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:#f1f5f9; --bg2:#ffffff; --bg3:#f8fafc;
      --border:#e2e8f0;
      --text:#1e293b; --text2:#475569; --text3:#94a3b8;
      --accent:#6366f1; --accent2:#818cf8;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
      --radius:12px; --radius-sm:8px;
      --col-m8bf:#7c3aed; --col-strad:#0891b2; --col-gxbf:#0891b2; --col-block:#dc2626;
      --col-m8bf-bg:#ede9fe; --col-strad-bg:#cffafe; --col-gxbf-bg:#cffafe; --col-block-bg:#fee2e2;
    }
    [data-theme="dark"] {
      --bg:#0f172a; --bg2:#1e293b; --bg3:#162032;
      --border:#2d3f55;
      --text:#e2e8f0; --text2:#94a3b8; --text3:#475569;
      --accent:#818cf8; --accent2:#6366f1;
      --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
      --col-m8bf:#a78bfa; --col-strad:#22d3ee; --col-gxbf:#22d3ee; --col-block:#f87171;
      --col-m8bf-bg:#1e1340; --col-strad-bg:#0c2233; --col-gxbf-bg:#0c2233; --col-block-bg:#2d0e0e;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

    .header{display:flex;align-items:center;gap:16px;padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;flex-wrap:wrap;}
    .logo{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);text-decoration:none;}
    .header-title{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--text2);}
    .header-spacer{flex:1;}
    .range-btns{display:flex;gap:4px;}
    .schwab-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'Inter',sans-serif;transition:background .15s;text-decoration:none;}
    .schwab-btn:hover{background:var(--bg);}
    .schwab-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
    .schwab-btn.primary:hover{opacity:.85;}
    .theme-toggle{background:var(--bg);border:1px solid var(--border);border-radius:20px;width:42px;height:22px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
    .theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--accent);transition:transform .2s;}
    [data-theme="light"] .theme-toggle::after{transform:translateX(20px);}

    .table-wrap{padding:16px 24px;overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:12px;min-width:1200px;}
    thead{position:sticky;top:0;z-index:5;}
    th{background:var(--bg2);border-bottom:2px solid var(--border);padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);cursor:pointer;user-select:none;white-space:nowrap;}
    th:hover{color:var(--accent);}
    th .sort-arrow{font-size:9px;margin-left:3px;opacity:.4;}
    th.sorted .sort-arrow{opacity:1;color:var(--accent);}
    td{padding:7px 10px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:12px;white-space:nowrap;}
    tr:hover td{background:var(--bg3);}
    .col-date{font-weight:600;color:var(--text);}
    .col-day{color:var(--text2);font-family:'Inter',sans-serif;font-size:11px;}
    .val-pos{color:#22c55e;} .val-neg{color:#ef4444;} .val-zero{color:var(--text3);}

    .cross{color:#ef4444;font-weight:700;font-size:14px;}

    .spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:12px;}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .spinner-text{font-size:13px;color:var(--text3);}

    .error-box{text-align:center;padding:60px 20px;color:var(--col-block);}
    .error-box p{margin:8px 0;}
    .error-box a{color:var(--accent);}
    .footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);}

    .chart-card{margin:16px 24px 0;padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}

    tfoot td{padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;border-top:2px solid var(--border);white-space:nowrap;background:var(--bg2);}

    /* Strategy toggle pills */
    .strat-toggles{display:flex;gap:8px;padding:12px 24px 0;flex-wrap:wrap;}
    .strat-pill{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;cursor:pointer;border:2px solid transparent;transition:all .15s;user-select:none;}
    .strat-pill.active{opacity:1;}
    .strat-pill.inactive{opacity:.35;filter:grayscale(.5);}
    .strat-pill[data-strat="m8bf"]{background:rgba(167,139,250,.15);color:#a78bfa;border-color:#a78bfa;}
    .strat-pill[data-strat="strad"]{background:rgba(34,211,238,.15);color:#22d3ee;border-color:#22d3ee;}
    .strat-pill[data-strat="gxbf"]{background:rgba(45,212,191,.15);color:#2dd4bf;border-color:#2dd4bf;}
    .strat-pill[data-strat="bobf"]{background:rgba(251,146,60,.15);color:#fb923c;border-color:#fb923c;}
    .strat-pill.inactive{border-color:transparent;}

    /* Stats cards */
    .stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;padding:16px 24px 0;}
    .stat-card{padding:14px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;gap:4px;}
    .stat-card .stat-label{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);}
    .stat-card .stat-value{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--text);}
    .stat-card.card-green{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.25);}
    .stat-card.card-green .stat-value{color:#22c55e;}
    .stat-card.card-red{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);}
    .stat-card.card-red .stat-value{color:#ef4444;}
    [data-theme="light"] .stat-card.card-green{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2);}
    [data-theme="light"] .stat-card.card-red{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);}

    @media(max-width:1024px){.stats-grid{grid-template-columns:repeat(3,1fr);}}
    @media(max-width:768px){
      .header{padding:10px 14px;gap:10px;}
      .table-wrap{padding:8px;}
      .stats-grid{grid-template-columns:repeat(2,1fr);padding:8px;}
      .strat-toggles{padding:8px 8px 0;}
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="logo">Σ3</a>
    <span class="header-title">Historical Signals</span>
    <div class="header-spacer"></div>
    <div class="range-btns">
      <button class="schwab-btn" data-months="1" onclick="filterMonths(1)">1M</button>
      <button class="schwab-btn" data-months="3" onclick="filterMonths(3)">3M</button>
      <button class="schwab-btn" data-months="6" onclick="filterMonths(6)">6M</button>
      <button class="schwab-btn primary" data-months="0" onclick="filterMonths(0)">ALL</button>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"></button>
  </div>

  <div class="strat-toggles" id="stratToggles">
    <div class="strat-pill active" data-strat="m8bf" onclick="toggleStrat('m8bf')">M8BF</div>
    <div class="strat-pill active" data-strat="strad" onclick="toggleStrat('strad')">Straddle</div>
    <div class="strat-pill active" data-strat="gxbf" onclick="toggleStrat('gxbf')">GXBF</div>
    <div class="strat-pill active" data-strat="bobf" onclick="toggleStrat('bobf')">BOBF</div>
  </div>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="chart-card" id="chartCard" style="display:none">
    <div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;">Equity Curve</div>
    <div style="position:relative;height:320px;">
      <canvas id="cumChart"></canvas>
    </div>
  </div>

  <div id="content">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="spinner-text">Loading historical signals…</div>
    </div>
  </div>

  <div class="footer">Calendar data (CPI, Fed, OPEX) covers 2026 only. Signals for earlier dates may not reflect these events.</div>

<script>
// ══════════════════════════════════════════════════════════════
// SIGNAL LOGIC (mirrored from schwab-proxy.js / index.html)
// ══════════════════════════════════════════════════════════════

const cpiSch   = ["January 13, 2026","February 13, 2026","March 11, 2026","April 10, 2026","May 12, 2026","June 10, 2026","July 14, 2026","August 12, 2026","September 11, 2026","October 14, 2026","November 10, 2026","December 10, 2026"];
const fedSch   = ["January 28, 2026","March 18, 2026","April 29, 2026","June 17, 2026","July 29, 2026","September 16, 2026","October 28, 2026","December 9, 2026"];
const opexSch  = ["January 16, 2026","February 20, 2026","March 20, 2026","April 17, 2026","May 15, 2026","June 18, 2026","July 17, 2026","August 21, 2026","September 18, 2026","October 16, 2026","November 20, 2026","December 18, 2026"];
const holidays = ["January 1, 2026","January 19, 2026","February 16, 2026","April 3, 2026","May 25, 2026","June 19, 2026","July 3, 2026","September 7, 2026","November 26, 2026","December 25, 2026"];
const vixSch   = ["January 21, 2026","February 18, 2026","March 18, 2026","April 15, 2026","May 20, 2026","June 17, 2026","July 15, 2026","August 19, 2026","September 16, 2026","October 21, 2026","November 18, 2026","December 16, 2026"];
const earningsSchedule = [
  { date:"January 28, 2026",  company:"Microsoft", ticker:"MSFT", timing:"AH", confirmed:true },
  { date:"January 28, 2026",  company:"Meta",      ticker:"META", timing:"AH", confirmed:true },
  { date:"January 29, 2026",  company:"Apple",     ticker:"AAPL", timing:"AH", confirmed:true },
  { date:"February 4, 2026",  company:"Alphabet",  ticker:"GOOGL",timing:"AH", confirmed:true },
  { date:"February 5, 2026",  company:"Amazon",    ticker:"AMZN", timing:"AH", confirmed:true },
  { date:"February 26, 2026", company:"NVIDIA",    ticker:"NVDA", timing:"AH", confirmed:true },
  { date:"April 23, 2026",    company:"Alphabet",  ticker:"GOOGL",timing:"AH", confirmed:false },
  { date:"April 28, 2026",    company:"Microsoft", ticker:"MSFT", timing:"AH", confirmed:false },
  { date:"April 29, 2026",    company:"Meta",      ticker:"META", timing:"AH", confirmed:true  },
  { date:"April 30, 2026",    company:"Apple",     ticker:"AAPL", timing:"AH", confirmed:false },
  { date:"April 30, 2026",    company:"Amazon",    ticker:"AMZN", timing:"AH", confirmed:false },
  { date:"May 20, 2026",      company:"NVIDIA",    ticker:"NVDA", timing:"AH", confirmed:true  },
  { date:"July 23, 2026",     company:"Alphabet",  ticker:"GOOGL",timing:"AH", confirmed:false },
  { date:"July 28, 2026",     company:"Microsoft", ticker:"MSFT", timing:"AH", confirmed:false },
  { date:"July 29, 2026",     company:"Meta",      ticker:"META", timing:"AH", confirmed:false },
  { date:"July 30, 2026",     company:"Apple",     ticker:"AAPL", timing:"AH", confirmed:false },
  { date:"July 30, 2026",     company:"Amazon",    ticker:"AMZN", timing:"AH", confirmed:false },
  { date:"August 19, 2026",   company:"NVIDIA",    ticker:"NVDA", timing:"AH", confirmed:false },
  { date:"October 22, 2026",  company:"Alphabet",  ticker:"GOOGL",timing:"AH", confirmed:false },
  { date:"October 27, 2026",  company:"Microsoft", ticker:"MSFT", timing:"AH", confirmed:false },
  { date:"October 28, 2026",  company:"Meta",      ticker:"META", timing:"AH", confirmed:false },
  { date:"October 29, 2026",  company:"Apple",     ticker:"AAPL", timing:"AH", confirmed:false },
  { date:"October 29, 2026",  company:"Amazon",    ticker:"AMZN", timing:"AH", confirmed:false },
  { date:"November 18, 2026", company:"NVIDIA",    ticker:"NVDA", timing:"AH", confirmed:false },
];

const T = { DROP_GXBF: 0.65, DROP_STRAD_MIN: 0, O2O_M8BF: 1.4, VIX_MAX_GXBF: 25, VIX_MAX_BOBF: 23, SPX_GAP_THRESHOLD: 0.9 };

function dateLong(d) { return d.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }); }
const todayLong = d => dateLong(d);
const isWkend = d => { const w = d.getDay(); return w === 0 || w === 6; };
const isHol = d => holidays.includes(dateLong(d));
const isTrade = d => !isWkend(d) && !isHol(d);
function nextTrade(d) { const n = new Date(d); do { n.setDate(n.getDate()+1); } while(isWkend(n)||isHol(n)); return n; }
function prevTrade(d) { const p = new Date(d); do { p.setDate(p.getDate()-1); } while(isWkend(p)||isHol(p)); return p; }
function isTodayAfter(ds, etDate) { const d = new Date(ds); if(isNaN(d)) return false; const a = nextTrade(d); return a.getFullYear()===etDate.getFullYear()&&a.getMonth()===etDate.getMonth()&&a.getDate()===etDate.getDate(); }
function isTodayBefore(ds, etDate) { const d = new Date(ds); if(isNaN(d)) return false; const b = prevTrade(d); return b.getFullYear()===etDate.getFullYear()&&b.getMonth()===etDate.getMonth()&&b.getDate()===etDate.getDate(); }
function parseLong(s) { const d = new Date(s); return isNaN(d)?null:new Date(d.getFullYear(),d.getMonth(),d.getDate(),12); }
function schedInMonth(list,ref) { const y=ref.getFullYear(),m=ref.getMonth(); for(const s of list){const d=parseLong(s);if(d&&d.getFullYear()===y&&d.getMonth()===m) return d;} return null; }
function isPostVixBeforeOpex(ref) { const vx=schedInMonth(vixSch,ref),op=schedInMonth(opexSch,ref); if(!vx||!op||vx>=op) return false; const pv=nextTrade(vx); return pv.getFullYear()===ref.getFullYear()&&pv.getMonth()===ref.getMonth()&&pv.getDate()===ref.getDate(); }
const isPostOpexMon = etDate => opexSch.some(ds=>isTodayAfter(ds,etDate))&&etDate.getDay()===1;
const isLastTradeMo = d => nextTrade(d).getMonth()!==d.getMonth();
function isEomN(n,d){const f=new Date(d.getFullYear(),d.getMonth()+1,1);let t=prevTrade(f);for(let i=0;i<n;i++)t=prevTrade(t);return t.getFullYear()===d.getFullYear()&&t.getMonth()===d.getMonth()&&t.getDate()===d.getDate();}
const isFirstTradeMo = d => prevTrade(d).getMonth()!==d.getMonth();
function isFirstTradeMon(d){const y=d.getFullYear(),m=d.getMonth();let x=new Date(y,m,1);while(isWkend(x)||isHol(x))x.setDate(x.getDate()+1);while(x.getDay()!==1)x=nextTrade(x);return x.getFullYear()===y&&x.getMonth()===m&&x.getDate()===d.getDate();}
function m8Sched(dow){switch(dow){case 1:return{t:"10:00",window:"10:00–10:29",s:["05","45","70","95"],everyWeek:false};case 2:return{t:"12:00",window:"12:00–12:29",s:["00","05","35","45","70","75","85","90"],everyWeek:false};case 3:return{t:"11:30",window:"11:30–11:59",s:["30","45","50","70","80","95"],everyWeek:false};case 4:return{t:"11:30",window:"11:30–11:59",s:["05","15","55","75","85"],everyWeek:true};case 5:return{t:"13:00",window:"13:00–13:29",s:["45","55","65","70","75","85","95"],everyWeek:true};default:return null;}}
function m8Msg(d){const sc=m8Sched(d.getDay());return sc?`M8BF — Window ${sc.window}`:"M8BF";}
function ordinal(n){const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function wdName(d){return["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][d]||"";}
function tradeWdLabel(d){const t=new Date(d.getFullYear(),d.getMonth(),d.getDate());const dow=t.getDay(),ms=new Date(t.getFullYear(),t.getMonth(),1);let c=0;for(let x=new Date(ms);x<=t;x.setDate(x.getDate()+1)){if(!isTrade(x))continue;if(x.getDay()===dow)c++;}if(!isTrade(t))return`${wdName(dow)} (market closed)`;return`${ordinal(c)} ${wdName(dow)}`;}
function isEarningsDay(etDate){return earningsSchedule.some(e=>e.date===todayLong(etDate));}

function calculateSignal({vixToday,vixYOpen,vixYClose,spxGapPct,etDate}){
  const cpiDay=cpiSch.includes(todayLong(etDate));
  const dow=etDate.getDay();
  const isMon=dow===1,isFri=dow===5,isWed=dow===3;
  const nmDay=isFirstTradeMo(etDate),nmMon=isFirstTradeMon(etDate);
  const fedDay=fedSch.includes(todayLong(etDate));
  const opexDay=opexSch.includes(todayLong(etDate));
  const postOpMon=isPostOpexMon(etDate);
  const postOpDay=opexSch.some(ds=>isTodayAfter(ds,etDate));
  const eomDay=isLastTradeMo(etDate),eom1=isEomN(1,etDate),eom2=isEomN(2,etDate);
  const vixExpDay=vixSch.includes(todayLong(etDate));
  const opex1=opexSch.some(ds=>isTodayBefore(ds,etDate));
  const earningsDay=isEarningsDay(etDate);
  const msftMetaEarnings=earningsSchedule.some(e=>e.date===todayLong(etDate)&&(e.ticker==='MSFT'||e.ticker==='META'));

  const o2o=(vixYOpen!=null)?vixYOpen-vixToday:NaN;
  const oNight=vixYClose-vixToday;

  let spxGapForcesM8BF=false;
  if(spxGapPct!==null&&spxGapPct!==undefined){spxGapForcesM8BF=Math.abs(spxGapPct)>=T.SPX_GAP_THRESHOLD;}

  let rec="",theme="neutral",crossed=false,pmNote=false;
  let blockT="",blockD="",entryT="",badge="";
  let strikeInfo=null;

  if(cpiDay){
    if(oNight>0){rec="Long ATM Call @ 9:32 AM (CPI) — Max $13";theme="strad";entryT="9:32 AM";badge="CPI CALL";}
    else{rec="No Trade (CPI, VIX up)";theme="block";crossed=true;blockT="hard";blockD="CPI day, VIX up";badge="BLOCKED";}
  } else if(spxGapForcesM8BF){
    const dir=spxGapPct>0?'▲':'▼';
    rec=m8Msg(etDate);theme="m8bf";badge="M8BF";strikeInfo=m8Sched(dow);entryT=strikeInfo?.window||"";
    blockD=`SPX gap ${dir}${Math.abs(spxGapPct).toFixed(2)}% ≥ ${T.SPX_GAP_THRESHOLD}% → M8BF forced`;
  } else {
    if(oNight>T.DROP_GXBF){
      if(vixToday>=T.VIX_MAX_GXBF){rec=`No GXBF (VIX ${vixToday} ≥ ${T.VIX_MAX_GXBF})`;theme="block";crossed=true;blockT="vix";blockD=`VIX ${vixToday} ≥ ${T.VIX_MAX_GXBF}`;badge="BLOCKED";}
      else{rec="GXBF @ 9:36 AM";theme="gxbf";entryT="9:36 AM";badge="GXBF";}
    } else if(o2o>T.O2O_M8BF){
      rec=m8Msg(etDate);theme="m8bf";badge="M8BF";strikeInfo=m8Sched(dow);entryT=strikeInfo?.window||"";
    } else if(oNight>T.DROP_STRAD_MIN&&oNight<T.DROP_GXBF){
      rec="Straddle @ 9:32 AM";theme="strad";entryT="9:32 AM";badge="STRADDLE";
    } else {
      rec=m8Msg(etDate);theme="m8bf";badge="M8BF";strikeInfo=m8Sched(dow);entryT=strikeInfo?.window||"";
    }

    if(rec.startsWith("M8BF")){
      if(fedDay){rec="No M8BF (Fed day)";theme="block";crossed=true;blockT="hard";blockD="M8BF not traded on Fed days";badge="BLOCKED";strikeInfo=null;}
      else if(msftMetaEarnings){const tickers=earningsSchedule.filter(e=>e.date===todayLong(etDate)&&(e.ticker==='MSFT'||e.ticker==='META')).map(e=>e.ticker).join(', ');rec=`No M8BF (${tickers} earnings)`;theme="block";crossed=true;blockT="hard";blockD="M8BF not traded on MSFT/META earnings days";badge="BLOCKED";strikeInfo=null;}
      else if(eom1){rec="No M8BF (EOM-1)";theme="block";crossed=true;blockT="hard";blockD="M8BF not traded on EOM-1 (no edge)";badge="BLOCKED";strikeInfo=null;}
    }
    if(isPostVixBeforeOpex(etDate)&&rec.startsWith("M8BF")){rec="No M8BF (post-VIX exp)";theme="block";crossed=true;blockT="hard";blockD="VIX exp before OPEX this month";badge="BLOCKED";strikeInfo=null;}

    if(nmDay&&!isMon&&(rec.startsWith("M8BF")||rec.startsWith("No M8BF"))){rec="NM Straddle @ 9:32 AM";theme="strad";crossed=false;blockT="";entryT="9:32 AM";badge="NM STRADDLE";strikeInfo=null;}
    if(eomDay){rec="Straddle @ 9:32 AM (EOM)";theme="strad";crossed=false;blockT="";entryT="9:32 AM";badge="EOM STRADDLE";strikeInfo=null;}
    if(isWed&&!fedDay&&!eomDay&&!nmDay&&rec.startsWith("Straddle")){rec=m8Msg(etDate);theme="m8bf";badge="M8BF";strikeInfo=m8Sched(dow);entryT=strikeInfo?.window||"";}
    if(opexDay&&rec.startsWith("Straddle")){rec="No Straddle (OPEX day)";theme="block";crossed=true;blockT="hard";blockD="Straddle not on OPEX";badge="BLOCKED";}
    if(postOpMon&&rec.startsWith("M8BF"))pmNote=true;

    if(postOpDay){
      const isM8=rec.startsWith("M8BF"),isStr=rec.startsWith("Straddle")||rec.startsWith("NM Straddle");
      if(isM8||isStr){
        if(vixToday>=T.VIX_MAX_GXBF){rec=`No GXBF (VIX ${vixToday} ≥ ${T.VIX_MAX_GXBF})`;theme="block";crossed=true;pmNote=false;blockT="vix";blockD=`OPEX+1 GXBF blocked, VIX ${vixToday}`;badge="BLOCKED";strikeInfo=null;}
        else{rec="GXBF @ 9:36 AM (OPEX+1)";theme="gxbf";crossed=false;pmNote=false;blockT="";entryT="9:36 AM";badge="GXBF";strikeInfo=null;}
      }
    }
  }

  if(pmNote)rec+=" (afternoon times preferred)";

  const bobfBlocks=[];
  if(nmMon)bobfBlocks.push("NM Monday");
  if(vixExpDay)bobfBlocks.push("VIX expiration");
  if(opexDay)bobfBlocks.push("OPEX");
  if(opex1)bobfBlocks.push("OPEX-1");
  if(eom2)bobfBlocks.push("EOM-2");
  if(eom1)bobfBlocks.push("EOM-1");
  if(earningsDay){const tickers=earningsSchedule.filter(e=>e.date===todayLong(etDate)).map(e=>e.ticker).join(',');bobfBlocks.push(`earnings (${tickers})`);}
  if(vixToday>T.VIX_MAX_BOBF)bobfBlocks.push("high VIX");

  let bobfRec,bobfBadge;
  if(bobfBlocks.length){bobfRec=`No BOBF (${bobfBlocks.join(", ")})`;bobfBadge="BLOCKED";}
  else{bobfRec=isFri?"BOBF (Friday version)":"BOBF in play";bobfBadge=isFri?"FRIDAY VERSION":"IN PLAY";}

  let m8bfText=rec,stradText=rec,gxbfText=rec;
  if(theme==='m8bf'){stradText=`No Straddle (${oNight<=0?'overnight VIX up':'overnight VIX drop > '+T.DROP_GXBF})`;gxbfText=`No GXBF (overnight VIX drop ≤ ${T.DROP_GXBF})`;}
  else if(theme==='strad'){m8bfText=`No M8BF (${oNight>0?'overnight VIX up':'open-to-open ≤ '+T.O2O_M8BF})`;gxbfText=`No GXBF (overnight VIX drop ≤ ${T.DROP_GXBF})`;}
  else if(theme==='gxbf'){m8bfText="No M8BF (overnight VIX up)";stradText=`No Straddle (overnight VIX drop > ${T.DROP_GXBF})`;}
  else if(theme==='block'){if(rec.includes('M8BF')){stradText=`No Straddle (${oNight<=0?'overnight VIX up':'overnight VIX drop > '+T.DROP_GXBF})`;gxbfText=`No GXBF (overnight VIX drop ≤ ${T.DROP_GXBF})`;}else if(rec.includes('Straddle')||rec.includes('CPI')||rec.includes('Trade')){m8bfText="No M8BF";gxbfText="No GXBF";}else if(rec.includes('GXBF')){m8bfText="No M8BF";stradText="No Straddle";}}

  return {rec,theme,crossed,badge,entryT,blockT,blockD,pmNote,strikeInfo,m8bfText,stradText,gxbfText,bobfRec,bobfBadge,bobfBlocks,oNight,o2o,spxGapPct,spxGapForcesM8BF,dayLabel:tradeWdLabel(etDate),dateStr:todayLong(etDate),eomDay};
}

// ══════════════════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════════════════

(function(){
  const s = localStorage.getItem('s3theme') || 'dark';
  document.documentElement.setAttribute('data-theme', s);
})();
document.getElementById('themeToggle').addEventListener('click', () => {
  const c = document.documentElement.getAttribute('data-theme');
  const n = c === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', n);
  localStorage.setItem('s3theme', n);
  if (cumChart) renderChart();
});

let allRows = [];   // computed once
let rows = [];      // filtered view
let sortCol = null;
let sortAsc = true;
const activeStrats = { m8bf:true, strad:true, gxbf:true, bobf:true };

function toggleStrat(key) {
  activeStrats[key] = !activeStrats[key];
  document.querySelector(`.strat-pill[data-strat="${key}"]`).classList.toggle('active', activeStrats[key]);
  document.querySelector(`.strat-pill[data-strat="${key}"]`).classList.toggle('inactive', !activeStrats[key]);
  renderTable();
}

function computeStats(visibleRows) {
  const pls = [];
  for (const row of visibleRows) {
    const s = row.signal || {};
    if (activeStrats.m8bf && s.theme === 'm8bf' && row.m8bfPL != null) pls.push(row.m8bfPL);
    if (activeStrats.strad && s.theme === 'strad' && row.stradPL != null) pls.push(row.stradPL);
    if (activeStrats.gxbf && s.theme === 'gxbf' && row.gxbfPL != null) pls.push(row.gxbfPL);
    if (activeStrats.bobf && s.bobfBadge !== 'BLOCKED' && row.bobfPL != null) pls.push(row.bobfPL);
  }
  if (!pls.length) return null;

  const wins = pls.filter(v => v > 0);
  const losses = pls.filter(v => v < 0);
  const totalPL = pls.reduce((a,b) => a+b, 0);
  const totalTrades = pls.length;
  const winPct = (wins.length / totalTrades) * 100;
  const avgPerTrade = totalPL / totalTrades;
  const avgWinner = wins.length ? wins.reduce((a,b) => a+b, 0) / wins.length : 0;
  const avgLoser = losses.length ? losses.reduce((a,b) => a+b, 0) / losses.length : 0;
  const maxWinner = wins.length ? Math.max(...wins) : 0;
  const maxLoser = losses.length ? Math.min(...losses) : 0;
  const sumWins = wins.reduce((a,b) => a+b, 0);
  const sumLosses = Math.abs(losses.reduce((a,b) => a+b, 0));
  const profitFactor = sumLosses > 0 ? sumWins / sumLosses : sumWins > 0 ? Infinity : 0;

  // Sharpe: mean/stddev of daily PL
  const mean = totalPL / totalTrades;
  const variance = pls.reduce((s,v) => s + (v - mean) ** 2, 0) / totalTrades;
  const sharpe = variance > 0 ? mean / Math.sqrt(variance) : 0;

  // Max drawdown (peak-to-trough on cumulative)
  // Sort rows by date ascending for cumulative
  const sorted = visibleRows.slice().sort((a,b) => a.date.localeCompare(b.date));
  let cum = 0, peak = 0, maxDD = 0;
  for (const row of sorted) {
    const s = row.signal || {};
    if (activeStrats.m8bf && s.theme === 'm8bf' && row.m8bfPL != null) cum += row.m8bfPL;
    if (activeStrats.strad && s.theme === 'strad' && row.stradPL != null) cum += row.stradPL;
    if (activeStrats.gxbf && s.theme === 'gxbf' && row.gxbfPL != null) cum += row.gxbfPL;
    if (activeStrats.bobf && s.bobfBadge !== 'BLOCKED' && row.bobfPL != null) cum += row.bobfPL;
    if (cum > peak) peak = cum;
    const dd = peak - cum;
    if (dd > maxDD) maxDD = dd;
  }

  return { totalPL, maxDD, winPct, sharpe, profitFactor, totalTrades, avgPerTrade, avgWinner, avgLoser, maxWinner, maxLoser, winners: wins.length };
}

function renderStats() {
  const grid = document.getElementById('statsGrid');
  const stats = computeStats(rows);
  if (!stats) { grid.innerHTML = ''; return; }

  const fmt = v => '$' + Math.round(v).toLocaleString();
  const cards = [
    { label:'P/L',          value: fmt(stats.totalPL),                  cls: stats.totalPL >= 0 ? 'card-green' : 'card-red' },
    { label:'Max Drawdown',  value: fmt(stats.maxDD),                   cls: 'card-red' },
    { label:'Win %',         value: stats.winPct.toFixed(1) + '%',      cls: 'card-green' },
    { label:'Sharpe',        value: stats.sharpe.toFixed(2),            cls: '' },
    { label:'Profit Factor', value: stats.profitFactor === Infinity ? '∞' : stats.profitFactor.toFixed(2), cls: '' },
    { label:'Trades',        value: stats.totalTrades.toLocaleString(), cls: '' },
    { label:'Avg / Trade',   value: fmt(stats.avgPerTrade),             cls: '' },
    { label:'Avg Winner',    value: fmt(stats.avgWinner),               cls: 'card-green' },
    { label:'Avg Loser',     value: fmt(stats.avgLoser),                cls: 'card-red' },
    { label:'Max Winner',    value: fmt(stats.maxWinner),               cls: 'card-green' },
    { label:'Max Loser',     value: fmt(stats.maxLoser),                cls: 'card-red' },
    { label:'Winners',       value: stats.winners.toLocaleString(),     cls: '' },
  ];
  grid.innerHTML = cards.map(c =>
    `<div class="stat-card ${c.cls}"><div class="stat-label">${c.label}</div><div class="stat-value">${c.value}</div></div>`
  ).join('');
}

async function init() {
  try {
    const resp = await fetch('history_data.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const raw = await resp.json();

    // Compute signals for each day (need previous day's data)
    for (let i = 1; i < raw.length; i++) {
      const cur = raw[i], prev = raw[i - 1];
      const parts = cur.date.split('-');
      const etDate = new Date(+parts[0], +parts[1] - 1, +parts[2], 12);

      let spxGapPct = null;
      if (cur.spxOpen != null && prev.spxClose != null) {
        spxGapPct = ((cur.spxOpen - prev.spxClose) / prev.spxClose) * 100;
      }

      const signal = calculateSignal({
        vixToday: cur.vixOpen,
        vixYOpen: prev.vixOpen,
        vixYClose: prev.vixClose,
        spxGapPct,
        etDate,
      });

      // Apply win rate override rules using previous day's M8BF win rate
      const prevWR = prev.m8bfWR;
      if (prevWR != null) {
        const dow = etDate.getDay();
        if (prevWR === 0 && signal.rec.startsWith("M8BF")) {
          // 0% rule: M8BF → Straddle
          if (!signal.eomDay) {
            signal.rec = "Straddle @ 9:32 AM"; signal.theme = "strad"; signal.crossed = false;
            signal.blockT = "0%rule"; signal.entryT = "9:32 AM"; signal.badge = "STRADDLE"; signal.strikeInfo = null;
          }
        } else if (prevWR >= 90 && signal.rec === "Straddle @ 9:32 AM") {
          // 90% rule: Straddle → M8BF
          const sc = m8Sched(dow);
          signal.rec = m8Msg(etDate); signal.theme = "m8bf"; signal.badge = "M8BF";
          signal.strikeInfo = sc; signal.entryT = sc?.window || ""; signal.blockT = "90%rule";
        }
      }

      allRows.push({
        date: cur.date,
        dayLabel: signal.dayLabel,
        vixOpen: cur.vixOpen,
        vixPrevClose: prev.vixClose,
        vixPrevOpen: prev.vixOpen,
        overnightDrop: parseFloat((prev.vixClose - cur.vixOpen).toFixed(2)),
        o2o: parseFloat((prev.vixOpen - cur.vixOpen).toFixed(2)),
        spxGapPct: spxGapPct !== null ? parseFloat(spxGapPct.toFixed(2)) : null,
        m8bfWR: cur.m8bfWR != null ? cur.m8bfWR : null,
        m8bfPL: cur.m8bfPL != null ? cur.m8bfPL : null,
        stradPL: cur.stradPL != null ? cur.stradPL : null,
        gxbfPL: cur.gxbfPL != null ? cur.gxbfPL : null,
        bobfPL: cur.bobfPL != null ? cur.bobfPL : null,
        prevWR: prevWR != null ? prevWR : null,
        signal,
      });
    }

    allRows.reverse(); // most recent first
    filterMonths(0);   // show all by default
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="error-box"><p>Failed to load history_data.json: ${e.message}</p><p>Run <code>python3 generate_history.py</code> to generate it.</p></div>`;
  }
}

function filterMonths(months) {
  document.querySelectorAll('.range-btns .schwab-btn').forEach(b => {
    b.classList.toggle('primary', parseInt(b.dataset.months) === months);
  });

  if (months === 0) {
    rows = allRows.slice();
  } else {
    const cutoff = new Date();
    cutoff.setMonth(cutoff.getMonth() - months);
    const cutoffStr = cutoff.toISOString().slice(0, 10);
    rows = allRows.filter(r => r.date >= cutoffStr);
  }
  sortCol = null;
  renderTable();
}

// ── Column defs ──
const cols = [
  { key:'date',        label:'Date',       type:'string' },
  { key:'dayLabel',    label:'Day',        type:'string' },
  { key:'vixOpen',     label:'VIX Open',   type:'number' },
  { key:'vixPrevClose',label:'Prev Close', type:'number' },
  { key:'vixPrevOpen', label:'Prev Open',  type:'number' },
  { key:'overnightDrop',label:'O/N Drop',  type:'number' },
  { key:'o2o',         label:'O2O',        type:'number' },
  { key:'spxGapPct',   label:'SPX Gap',    type:'number' },
  { key:'m8bfWR',     label:'M8BF WR%',   type:'number' },
  { key:'m8bfPL',      label:'M8BF',       type:'stratPL' },
  { key:'stradPL',     label:'Straddle',   type:'stratPL' },
  { key:'gxbfPL',      label:'GXBF',       type:'stratPL' },
  { key:'bobfPL',      label:'BOBF',       type:'stratPL' },
];

function getValue(row, col) {
  switch(col.key) {
    case 'dayLabel': return row.dayLabel || '';
    case 'm8bfWR': return row.m8bfWR != null ? row.m8bfWR : -1;
    case 'm8bfPL': return row.signal?.theme === 'm8bf' ? (row.m8bfPL != null ? row.m8bfPL : 0.1) : -Infinity;
    case 'stradPL': return row.signal?.theme === 'strad' ? (row.stradPL != null ? row.stradPL : 0.1) : -Infinity;
    case 'gxbfPL': return row.signal?.theme === 'gxbf' ? (row.gxbfPL != null ? row.gxbfPL : 0.1) : -Infinity;
    case 'bobfPL': return row.signal?.bobfBadge !== 'BLOCKED' ? (row.bobfPL != null ? row.bobfPL : 0.1) : -Infinity;
    default: return row[col.key];
  }
}

function sortRows(colIdx) {
  const col = cols[colIdx];
  if (sortCol === colIdx) sortAsc = !sortAsc;
  else { sortCol = colIdx; sortAsc = true; }

  rows.sort((a, b) => {
    let va = getValue(a, col), vb = getValue(b, col);
    if (va == null) va = col.type === 'number' ? -Infinity : '';
    if (vb == null) vb = col.type === 'number' ? -Infinity : '';
    let cmp = typeof va === 'number' && typeof vb === 'number' ? va - vb : String(va).localeCompare(String(vb));
    return sortAsc ? cmp : -cmp;
  });
  renderTable();
}

function valClass(v) { return v == null || v === 0 ? 'val-zero' : v > 0 ? 'val-pos' : 'val-neg'; }
function fmtNum(v) { return v == null ? '—' : v.toFixed(2); }

function stratCell(signalActive, pl) {
  // signalActive: did this strategy's signal fire?
  // pl: trade P/L from data (null = no trade data)
  if (!signalActive) return '<td class="cross" style="text-align:center">✗</td>';
  if (pl == null) return '<td style="color:var(--text3);font-style:italic;text-align:center;font-size:11px">No fill</td>';
  const cls = pl > 0 ? 'val-pos' : pl < 0 ? 'val-neg' : 'val-zero';
  return `<td class="${cls}" style="font-weight:600">$${pl.toLocaleString()}</td>`;
}

function renderTable() {
  let h = '<div class="table-wrap"><table><thead><tr>';
  cols.forEach((col, i) => {
    const sorted = sortCol === i;
    const arrow = sorted ? (sortAsc ? '▲' : '▼') : '⇅';
    h += `<th class="${sorted?'sorted':''}" onclick="sortRows(${i})">${col.label}<span class="sort-arrow">${arrow}</span></th>`;
  });
  h += '</tr></thead><tbody>';

  // Totals accumulators
  let totM8=0, totStrad=0, totGxbf=0, totBobf=0;

  for (const row of rows) {
    const s = row.signal || {};
    h += '<tr>';
    h += `<td class="col-date">${row.date}</td>`;
    h += `<td class="col-day">${row.dayLabel}</td>`;
    h += `<td>${fmtNum(row.vixOpen)}</td>`;
    h += `<td>${fmtNum(row.vixPrevClose)}</td>`;
    h += `<td>${fmtNum(row.vixPrevOpen)}</td>`;
    h += `<td class="${valClass(row.overnightDrop)}">${fmtNum(row.overnightDrop)}</td>`;
    h += `<td class="${valClass(row.o2o)}">${fmtNum(row.o2o)}</td>`;
    h += `<td class="${valClass(row.spxGapPct)}">${row.spxGapPct!=null?row.spxGapPct.toFixed(2)+'%':'—'}</td>`;
    h += `<td style="font-weight:700;${row.m8bfWR!=null?(row.m8bfWR>=90?'color:#22c55e':row.m8bfWR===0?'color:#ef4444':'color:var(--text)'):'color:var(--text3)'}">${row.m8bfWR!=null?row.m8bfWR+'%':'—'}</td>`;
    h += stratCell(s.theme === 'm8bf', row.m8bfPL);
    h += stratCell(s.theme === 'strad', row.stradPL);
    h += stratCell(s.theme === 'gxbf', row.gxbfPL);
    h += stratCell(s.bobfBadge !== 'BLOCKED', row.bobfPL);
    h += '</tr>';

    if (activeStrats.m8bf && s.theme === 'm8bf' && row.m8bfPL != null) totM8 += row.m8bfPL;
    if (activeStrats.strad && s.theme === 'strad' && row.stradPL != null) totStrad += row.stradPL;
    if (activeStrats.gxbf && s.theme === 'gxbf' && row.gxbfPL != null) totGxbf += row.gxbfPL;
    if (activeStrats.bobf && s.bobfBadge !== 'BLOCKED' && row.bobfPL != null) totBobf += row.bobfPL;
  }

  // Totals row
  const fc = (v, active) => active ? `<td class="${valClass(v)}" style="font-weight:700">$${Math.round(v).toLocaleString()}</td>` : '<td style="color:var(--text3);text-align:center">—</td>';
  h += '</tbody><tfoot><tr>';
  h += '<td colspan="9" style="text-align:right;font-family:Inter,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)">TOTAL</td>';
  h += fc(totM8, activeStrats.m8bf) + fc(totStrad, activeStrats.strad) + fc(totGxbf, activeStrats.gxbf) + fc(totBobf, activeStrats.bobf);
  h += '</tr></tfoot></table></div>';
  document.getElementById('content').innerHTML = h;
  renderStats();
  renderChart();
}

let cumChart = null;
function renderChart() {
  const card = document.getElementById('chartCard');
  // Sort rows ascending by date for cumulative calc
  const sorted = rows.slice().sort((a,b) => a.date.localeCompare(b.date));
  if (!sorted.length) { card.style.display='none'; return; }
  card.style.display = '';

  const dates=[], cumM8=[], cumStrad=[], cumGxbf=[], cumBobf=[], cumAll=[];
  let rm=0, rs=0, rg=0, rb=0;
  for (const row of sorted) {
    const s = row.signal || {};
    if (activeStrats.m8bf && s.theme === 'm8bf' && row.m8bfPL != null) rm += row.m8bfPL;
    if (activeStrats.strad && s.theme === 'strad' && row.stradPL != null) rs += row.stradPL;
    if (activeStrats.gxbf && s.theme === 'gxbf' && row.gxbfPL != null) rg += row.gxbfPL;
    if (activeStrats.bobf && s.bobfBadge !== 'BLOCKED' && row.bobfPL != null) rb += row.bobfPL;
    dates.push(row.date);
    cumM8.push(rm); cumStrad.push(rs); cumGxbf.push(rg); cumBobf.push(rb);
    cumAll.push(rm+rs+rg+rb);
  }

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const gridColor = isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.08)';
  const tickColor = isDark ? '#94a3b8' : '#475569';

  const datasets = [
    { label:'M8BF',     data:cumM8,    borderColor:'#a78bfa', backgroundColor:'rgba(167,139,250,.1)', tension:.3, borderWidth:2, pointRadius:0, pointHitRadius:6, hidden:!activeStrats.m8bf },
    { label:'Straddle', data:cumStrad, borderColor:'#22d3ee', backgroundColor:'rgba(34,211,238,.1)',  tension:.3, borderWidth:2, pointRadius:0, pointHitRadius:6, hidden:!activeStrats.strad },
    { label:'GXBF',     data:cumGxbf,  borderColor:'#2dd4bf', backgroundColor:'rgba(45,212,191,.1)',  tension:.3, borderWidth:2, pointRadius:0, pointHitRadius:6, hidden:!activeStrats.gxbf },
    { label:'BOBF',     data:cumBobf,  borderColor:'#fb923c', backgroundColor:'rgba(251,146,60,.1)',  tension:.3, borderWidth:2, pointRadius:0, pointHitRadius:6, hidden:!activeStrats.bobf },
    { label:'Combined', data:cumAll,   borderColor: isDark?'#e2e8f0':'#1e293b', backgroundColor: isDark?'rgba(226,232,240,.08)':'rgba(30,41,59,.08)', tension:.3, borderWidth:2.5, pointRadius:0, pointHitRadius:6, borderDash:[6,3] },
  ];

  const cfg = {
    type:'line',
    data:{ labels:dates, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ position:'top', labels:{ color:tickColor, usePointStyle:true, pointStyle:'line', font:{size:11} } },
        tooltip:{ callbacks:{ label: ctx => `${ctx.dataset.label}: $${Math.round(ctx.parsed.y).toLocaleString()}` } },
      },
      scales:{
        x:{ ticks:{ color:tickColor, maxTicksLimit:12, font:{size:10} }, grid:{ color:gridColor } },
        y:{ ticks:{ color:tickColor, font:{size:10}, callback: v => '$'+v.toLocaleString() }, grid:{ color:gridColor } },
      },
    },
  };

  if (cumChart) { cumChart.destroy(); cumChart = null; }
  const canvas = document.getElementById('cumChart');
  cumChart = new Chart(canvas, cfg);
}

init();
</script>
