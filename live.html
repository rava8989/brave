<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Σ3 — M8BF Today</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:#f1f5f9; --bg2:#ffffff; --bg3:#f8fafc;
      --border:#e2e8f0;
      --text:#1e293b; --text2:#475569; --text3:#94a3b8;
      --accent:#6366f1; --accent2:#818cf8;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
      --radius:12px; --radius-sm:8px;
      --green:#22c55e; --red:#ef4444; --yellow:#f59e0b;
    }
    [data-theme="dark"] {
      --bg:#0f172a; --bg2:#1e293b; --bg3:#162032;
      --border:#2d3f55;
      --text:#e2e8f0; --text2:#94a3b8; --text3:#475569;
      --accent:#818cf8; --accent2:#6366f1;
      --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
      --green:#4ade80; --red:#f87171; --yellow:#fbbf24;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

    /* HEADER */
    .header{display:flex;align-items:center;gap:16px;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;flex-wrap:wrap;}
    .logo{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);text-decoration:none;}
    .nav{display:flex;gap:4px;}
    .nav a{font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;border:1px solid transparent;}
    .nav a:hover{background:var(--bg3);color:var(--text);}
    .nav a.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .header-spacer{flex:1;}
    .live-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text3);font-family:'JetBrains Mono',monospace;}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);}
    .live-dot.green{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
    .live-dot.yellow{background:var(--yellow);}
    .live-dot.red{background:var(--red);}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    .theme-toggle{background:var(--bg);border:1px solid var(--border);border-radius:20px;width:42px;height:22px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
    .theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--accent);transition:transform .2s;}
    [data-theme="light"] .theme-toggle::after{transform:translateX(20px);}

    /* MAIN LAYOUT */
    .main{max-width:1100px;margin:0 auto;padding:20px 24px;}

    /* NO TRADE STATE */
    .no-trade{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;text-align:center;}
    .no-trade-icon{font-size:48px;opacity:.3;}
    .no-trade-title{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--text2);}
    .no-trade-sub{font-size:13px;color:var(--text3);max-width:380px;line-height:1.6;}
    .no-trade-window{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;}
    .win-day{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);}
    .win-time{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);}

    /* STATS ROW */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
    .stat-card{padding:16px 18px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);box-shadow:var(--shadow);}
    .stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-family:'Inter',sans-serif;margin-bottom:6px;}
    .stat-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--text);}
    .stat-value.green{color:var(--green);}
    .stat-value.red{color:var(--red);}
    .stat-value.yellow{color:var(--yellow);}
    .stat-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;}

    /* CHART CARD */
    .chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
    .chart-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
    .chart-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text2);}
    .chart-header-spacer{flex:1;}
    .last-update{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
    .chart-wrap{position:relative;height:260px;}

    /* BUTTERFLY VIZ */
    .bf-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
    .bf-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:16px;}
    .bf-viz{position:relative;height:80px;}
    .bf-track{position:absolute;top:50%;left:0;right:0;height:4px;background:var(--border);border-radius:2px;transform:translateY(-50%);}
    .bf-fill{position:absolute;top:50%;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transform:translateY(-50%);transition:width .4s ease,left .4s ease;}
    .bf-label{position:absolute;top:50%;transform:translateX(-50%) translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;}
    .bf-label-line{width:2px;height:18px;background:var(--border);}
    .bf-label-line.accent{background:var(--accent);}
    .bf-label-line.spx{background:var(--yellow);height:24px;}
    .bf-label-val{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--text2);white-space:nowrap;}
    .bf-label-name{font-family:'Inter',sans-serif;font-size:9px;color:var(--text3);white-space:nowrap;}
    .bf-label.top .bf-label-line{order:2;}
    .bf-label.top .bf-label-val{order:1;}
    .bf-label.top .bf-label-name{order:0;}
    .bf-label.bot .bf-label-line{order:0;}
    .bf-label.bot .bf-label-val{order:1;}
    .bf-label.bot .bf-label-name{order:2;}

    /* TRADE DETAILS */
    .details-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
    .details-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px;}
    .details-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
    .detail-row{display:flex;flex-direction:column;gap:2px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border);}
    .detail-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-family:'Inter',sans-serif;}
    .detail-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text);}

    /* STATUS BAR */
    .status-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:20px;font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace;}
    .status-bar .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

    /* CLOSED BANNER */
    .closed-banner{padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:20px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;text-align:center;border:1px solid;}
    .closed-banner.win{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--green);}
    .closed-banner.loss{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red);}

    .footer{text-align:center;padding:24px;font-size:11px;color:var(--text3);}
    .footer a{color:var(--accent);text-decoration:none;}

    /* SPX LIVE CHART SECTION */
    .spx-chart-section{max-width:1100px;margin:20px auto 0;padding:0 24px;}
    .legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;}
    .legend-item{display:flex;align-items:center;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}

    /* SPX price ticker */
    .spx-ticker{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;}
    .spx-price{font-weight:700;color:var(--text);}
    .spx-chg.up{color:var(--green);}
    .spx-chg.dn{color:var(--red);}

    /* Schwab connect banner */
    .connect-banner{padding:10px 16px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);border-radius:var(--radius-sm);margin-bottom:20px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--accent);}
    .connect-banner a{color:var(--accent);font-weight:600;margin-left:auto;text-decoration:none;padding:4px 10px;border:1px solid var(--accent);border-radius:6px;font-family:'JetBrains Mono',monospace;}
    .connect-banner a:hover{background:var(--accent);color:#fff;}
    .hidden{display:none!important;}

    @media(max-width:768px) {
      .nav{flex-wrap:wrap;}
      .nav a{padding:8px 10px;}
      .header { padding:10px 14px; gap:8px; }
      .main { padding:12px; }
      .stats-row { grid-template-columns:1fr 1fr; gap:8px; }
      .stat-card { padding:10px 12px; }
      .stat-value { font-size:16px; }
      .chart-wrap { height:180px; }
      .details-grid { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>

<script>
// ─── Theme ───────────────────────────────────────────────────────────────────
const html = document.documentElement;
const saved = localStorage.getItem('theme') || 'dark';
html.setAttribute('data-theme', saved);
document.getElementById('themeToggle').addEventListener('click', () => {
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  if (plChart) updateChartTheme();
  if (spxChart) updateSPXChartTheme();
});

// ─── State ───────────────────────────────────────────────────────────────────
let trade = null;         // today_trade.json data
let plHistory = [];       // [{time, spx, pl}]
let plChart = null;
let payoffChart = null;
let spxHistory = [];      // [{time, price}] from spx_history.json
let signalsToday = [];    // [{time, center, t1, premium, banned}] from signals_today.json
let spxChart = null;
let schwabConnected = false;
let marketStatus = 'unknown'; // pre-market | open | closed
let spxPrice = null;
let spxPrevClose = null;
let pollTimer = null;

// ─── Fetch with Retry ───────────────────────────────────────────────────────
async function fetchWithRetry(url, opts = {}, retries = 3, baseDelay = 1000) {
  for (let i = 0; i <= retries; i++) {
    try {
      const resp = await fetch(url, opts);
      if (resp.ok || resp.status < 500) return resp;
      if (i < retries) await new Promise(r => setTimeout(r, baseDelay * 2 ** i));
    } catch (e) {
      if (i === retries) throw e;
      await new Promise(r => setTimeout(r, baseDelay * 2 ** i));
    }
  }
}

// ─── Market Hours (ET) ───────────────────────────────────────────────────────
function getNowET() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
}
function getMarketStatus() {
  const now = getNowET();
  const h = now.getHours(), m = now.getMinutes();
  const mins = h * 60 + m;
  const day = now.getDay();
  if (day === 0 || day === 6) return 'closed';
  if (mins < 9 * 60 + 30) return 'pre-market';
  if (mins <= 16 * 60) return 'open';
  return 'closed';
}

// ─── P&L Formula ─────────────────────────────────────────────────────────────
function computePL(trade, spxNow) {
  const { bf_lower, bf_upper, premium } = trade;
  const wing = (bf_upper - bf_lower) / 2;
  const intrinsic = Math.max(0, Math.min(spxNow - bf_lower, bf_upper - spxNow));
  const clipped = Math.min(intrinsic, wing);
  return Math.round((clipped - premium) * 100);
}

// ─── SPX History + Signals fetch ─────────────────────────────────────────────
function todayET() {
  return getNowET().toISOString().slice(0, 10);
}
const RAW = 'https://raw.githubusercontent.com/rava8989/brave/main/';
const PROXY = 'https://schwab-proxy.ravamt4.workers.dev';
async function loadSPXHistory() {
  try {
    // Primary: fetch from worker (live KV data, updated every 2 min)
    const r = await fetchWithRetry(PROXY + '/spx-history', { cache: 'no-store' });
    if (r.ok) {
      const d = await r.json();
      if (d.date === todayET() && d.data && d.data.length > 0) {
        spxHistory = d.data;
        return;
      }
    }
  } catch { /* worker unavailable */ }
  // Fallback: GitHub raw (legacy, may be stale)
  try {
    const r = await fetchWithRetry(RAW + 'spx_history.json?v=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) return;
    const d = await r.json();
    if (d.date !== todayET()) return;
    spxHistory = d.data || [];
  } catch { /* file not yet created */ }
}
async function loadSignals() {
  try {
    const r = await fetchWithRetry('https://schwab-proxy.ravamt4.workers.dev/signals', { cache: 'no-store' });
    if (!r.ok) return;
    const d = await r.json();
    if (d.date !== todayET()) return;
    // Deduplicate by time — keep last entry if duplicates exist
    const sigMap = {};
    for (const s of (d.signals || [])) sigMap[s.time] = s;
    signalsToday = Object.values(sigMap).sort((a, b) => a.time.localeCompare(b.time));
  } catch { /* file not yet created by scraper */ }
}

// ─── SPX Chart ────────────────────────────────────────────────────────────────
function createSPXChart() {
  const ctx = document.getElementById('spxCanvas');
  if (!ctx) return;
  if (spxChart) { spxChart.destroy(); spxChart = null; }
  const c = chartColors();
  spxChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        {
          label: 'SPX',
          data: [],
          borderColor: '#818cf8',
          backgroundColor: 'rgba(129,140,248,.06)',
          borderWidth: 2,
          pointRadius: 0,
          fill: true,
          tension: 0.2,
          spanGaps: true,
        },
        {
          label: 'M8BF Center',
          data: [],
          borderColor: 'transparent',
          backgroundColor: '#f472b6',
          pointBackgroundColor: '#f472b6',
          pointRadius: 3,
          pointHoverRadius: 5,
          showLine: false,
          spanGaps: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: isDark() ? '#1e293b' : '#fff',
          borderColor: isDark() ? '#2d3f55' : '#e2e8f0',
          borderWidth: 1,
          titleColor: isDark() ? '#e2e8f0' : '#1e293b',
          bodyColor: isDark() ? '#94a3b8' : '#475569',
          filter: item => item.parsed.y !== null,
          callbacks: {
            label: ctx => {
              if (ctx.datasetIndex === 0) return 'SPX: ' + fmtSpx(ctx.parsed.y);
              if (ctx.parsed.y !== null) return 'Center: ' + ctx.parsed.y;
              return null;
            }
          }
        }
      },
      layout: { padding: { left: 8 } },
      scales: {
        x: {
          ticks: { color: c.text, font: { family: 'JetBrains Mono', size: 10 }, maxTicksLimit: 8 },
          grid: { color: c.grid },
        },
        y: {
          afterFit: axis => { axis.width = 68; },
          ticks: { color: c.text, font: { family: 'JetBrains Mono', size: 10 }, callback: v => v.toLocaleString('en-US', { maximumFractionDigits: 0 }) },
          grid: { color: c.grid },
        }
      }
    }
  });
}
function rebuildSPXChart() {
  if (!spxChart) createSPXChart();
  if (!spxChart) return;

  // Round a HH:MM string to nearest 5-min mark
  function snap5(t) {
    const [h, m] = t.split(':').map(Number);
    return `${String(h).padStart(2,'0')}:${String(Math.round(m/5)*5%60).padStart(2,'0')}`;
  }

  // Update chart title with date and ET label
  const titleEl = document.getElementById('spxChartTitle');
  if (titleEl) {
    const now = getNowET();
    const dateStr = now.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    titleEl.textContent = `SPX Live · M8BF Signals · ${dateStr} ET`;
  }

  // Build 5-min snapped maps
  const spxMap5 = {};
  for (const p of spxHistory) { spxMap5[snap5(p.time)] = p.price; }
  // Inject current live price so chart never looks frozen between history pushes
  if (spxPrice !== null) {
    const nowStr = getNowET().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    spxMap5[snap5(nowStr)] = spxPrice;
  }
  const sigMap5 = {};
  for (const s of signalsToday) { sigMap5[snap5(s.time)] = s; }

  // Merge time points from both sources, sorted
  const timeSet = new Set([
    ...Object.keys(spxMap5),
    ...Object.keys(sigMap5),
  ]);
  const times = Array.from(timeSet).sort();
  if (!times.length) return;

  spxChart.data.labels = times;
  spxChart.data.datasets[0].data = times.map(t => spxMap5[t] ?? null);
  spxChart.data.datasets[1].data = times.map(t => {
    const s = sigMap5[t];
    return s ? s.center : null;
  });

  // Fixed ±60 point buffer so the chart never feels claustrophobic
  const allPrices = [
    ...spxHistory.map(p => p.price),
    ...signalsToday.map(s => s.center),
  ].filter(Boolean);
  if (allPrices.length) {
    spxChart.options.scales.y.min = Math.min(...allPrices) - 25;
    spxChart.options.scales.y.max = Math.max(...allPrices) + 25;
    delete spxChart.options.scales.y.grace;
  }

  const last = spxHistory[spxHistory.length - 1];
  const lu = document.getElementById('spxChartUpdate');
  if (lu && last) lu.textContent = 'Updated ' + snap5(last.time) + ' ET';

  spxChart.update('none');
}
function updateSPXChartTheme() {
  if (!spxChart) return;
  const c = chartColors();
  spxChart.options.scales.x.ticks.color = c.text;
  spxChart.options.scales.x.grid.color = c.grid;
  spxChart.options.scales.y.ticks.color = c.text;
  spxChart.options.scales.y.grid.color = c.grid;
  spxChart.update();
}

// ─── Load today's trade status from worker ───────────────────────────────────
async function loadTrade() {
  try {
    // Primary: fetch from worker (computes trade from live signals + window rules)
    const r = await fetchWithRetry(PROXY + '/trade', { cache: 'no-store' });
    if (r.ok) {
      trade = await r.json();
      return;
    }
  } catch { /* worker unavailable */ }
  // Fallback: GitHub raw (legacy, may be stale)
  try {
    const r = await fetchWithRetry(RAW + 'today_trade.json', { cache: 'no-store' });
    if (!r.ok) return;
    trade = await r.json();
  } catch { /* keep last known trade */ }
}

// ─── OAuth Callback Handler ───────────────────────────────────────────────────
// When Schwab redirects here with ?code=XXX, show it prominently for copy-paste
function checkOAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) return;

  // Show overlay with the code — no inline onclick, no URL interpolation into HTML
  const fullUrl = window.location.href;
  const overlay = document.createElement('div');

// ─── SPX Live Data ────────────────────────────────────────────────────────────
// The Windows machine writes spx_live.json every 60s. We poll it here.
let lastSpxTimestamp = null;

async function refreshSPX() {
  try {
    const r = await fetchWithRetry(RAW + 'spx_live.json?v=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) return false;
    const data = await r.json();
    if (!data.price) return false;

    // Check freshness BEFORE setting price — don't show stale data
    if (data.time && data.date) {
      const nowET = getNowET();
      const [dh, dm] = data.time.split(':').map(Number);
      const [dy, dmo, dd] = data.date.split('-').map(Number);
      const sameDay = (nowET.getFullYear() === dy && (nowET.getMonth()+1) === dmo && nowET.getDate() === dd);
      if (!sameDay) { schwabConnected = false; return false; }
      const ageSecs = (nowET.getHours() * 60 + nowET.getMinutes() - dh * 60 - dm) * 60;
      if (ageSecs > 300) { schwabConnected = false; return false; }
    }

    spxPrice = data.price;
    spxPrevClose = data.prev_close;
    lastSpxTimestamp = Date.now();
    schwabConnected = true;
    return true;
  } catch {
    schwabConnected = false;
    return false;
  }
}

function fmt$(n) {
  if (n === null || n === undefined) return '—';
  const s = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return (n >= 0 ? '+$' : '-$') + s;
}
function fmtSpx(n) {
  if (!n) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function plClass(pl) {
  if (pl === null || pl === undefined) return '';
  return pl >= 0 ? 'green' : 'red';
}
function timeLabel() {
  return getNowET().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}

// ─── M8BF Windows ────────────────────────────────────────────────────────────
const M8BF_WINDOWS = {
  1: { label: 'Monday',    start: '11:00', end: '11:30' },
  2: { label: 'Tuesday',   start: '13:30', end: '14:00' },
  3: { label: 'Wednesday', start: '12:00', end: '12:30' },
  4: { label: 'Thursday',  start: '11:00', end: '11:30' },
  5: { label: 'Friday',    start: '13:00', end: '13:30' },
};

function getNextWindow() {
  const now = getNowET();
  // Try up to 7 days ahead to find the next upcoming window
  for (let offset = 0; offset < 7; offset++) {
    const d = new Date(now);
    d.setDate(d.getDate() + offset);
    const dow = d.getDay();
    const win = M8BF_WINDOWS[dow];
    if (!win) continue;
    // Parse window end time
    const [endH, endM] = win.end.split(':').map(Number);
    const winEndMins = endH * 60 + endM;
    const nowMins = now.getHours() * 60 + now.getMinutes();
    // If same day, only show if window hasn't ended yet
    if (offset === 0 && nowMins >= winEndMins) continue;
    return win;
  }
  return null;
}

// ─── Payoff / Risk Profile Chart ─────────────────────────────────────────────
function createPayoffChart(trade, spxNow) {
  const ctx = document.getElementById('payoffCanvas');
  if (!ctx) return;
  if (payoffChart) { payoffChart.destroy(); payoffChart = null; }

  const { bf_lower, bf_upper, premium } = trade;
  const wing = (bf_upper - bf_lower) / 2;
  const pad  = 70;
  const lo   = Math.floor(bf_lower - pad);
  const hi   = Math.ceil(bf_upper  + pad);

  const beLow  = +(bf_lower + premium).toFixed(1);
  const beHigh = +(bf_upper - premium).toFixed(1);

  const labels = [], payoffData = [];
  for (let v = lo; v <= hi; v++) {
    labels.push(v);
    const intr = Math.max(0, Math.min(v - bf_lower, bf_upper - v));
    payoffData.push(Math.round((Math.min(intr, wing) - premium) * 100));
  }

  // Custom plugin — draws SPX vertical line + breakeven markers
  const overlayPlugin = {
    id: 'payoffOverlay',
    afterDraw(chart) {
      const { spxNow, beLow, beHigh } = chart._opts || {};
      const { ctx: cx, chartArea: ca, scales } = chart;

      // Breakeven lines
      for (const be of [beLow, beHigh]) {
        if (be == null) continue;
        const idx = Math.round(be - lo);
        if (idx < 0 || idx >= labels.length) continue;
        const x = scales.x.getPixelForValue(idx);
        cx.save();
        cx.beginPath(); cx.moveTo(x, ca.top); cx.lineTo(x, ca.bottom);
        cx.strokeStyle = 'rgba(74,222,128,.55)'; cx.lineWidth = 1;
        cx.setLineDash([3, 4]); cx.stroke();
        cx.font = '600 9px Inter'; cx.fillStyle = '#4ade80';
        cx.textAlign = 'center';
        cx.fillText('BE ' + be.toFixed(0), x, ca.top + 11);
        cx.restore();
      }

      // SPX current price line
      if (spxNow != null) {
        const idx = Math.round(spxNow - lo);
        if (idx >= 0 && idx < labels.length) {
          const x = scales.x.getPixelForValue(idx);
          cx.save();
          cx.beginPath(); cx.moveTo(x, ca.top); cx.lineTo(x, ca.bottom);
          cx.strokeStyle = '#fbbf24'; cx.lineWidth = 2;
          cx.setLineDash([6, 3]); cx.stroke();
          cx.font = 'bold 10px JetBrains Mono'; cx.fillStyle = '#fbbf24';
          cx.textAlign = 'center';
          cx.fillText(spxNow.toFixed(0), x, ca.bottom + 14);
          cx.restore();
        }
      }
    }
  };

  const c = chartColors();
  payoffChart = new Chart(ctx, {
    type: 'line',
    plugins: [overlayPlugin],
    data: {
      labels,
      datasets: [
        {
          data: payoffData,
          borderColor: '#818cf8',
          borderWidth: 2.5,
          pointRadius: 0,
          fill: false,
          tension: 0,
        },
        {
          data: labels.map(() => 0),
          borderColor: c.zero,
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => 'SPX: ' + items[0].label,
            label: item => item.datasetIndex === 0 ? 'P&L: ' + fmt$(item.parsed.y) : null,
          }
        }
      },
      scales: {
        x: {
          ticks: { color: c.text, font: { family: 'JetBrains Mono', size: 10 }, maxTicksLimit: 8, callback(v) { return this.getLabelForValue(v); } },
          grid: { color: c.grid },
        },
        y: {
          afterFit: axis => { axis.width = 68; },
          ticks: { color: c.text, font: { family: 'JetBrains Mono', size: 10 }, callback: v => fmt$(v) },
          grid: { color: c.grid },
        }
      }
    }
  });
  payoffChart._opts = { spxNow, beLow, beHigh };
}
function updatePayoffChart(spxNow) {
  if (!payoffChart) return;
  payoffChart._opts = { ...payoffChart._opts, spxNow };
  payoffChart.update('none');
}

function isTradeToday() {
  if (!trade || !trade.date) return false;
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const todayStr = et.getFullYear() + '-' + String(et.getMonth()+1).padStart(2,'0') + '-' + String(et.getDate()).padStart(2,'0');
  return trade.date === todayStr;
}

        <div class="detail-row"><span class="detail-label">Breakeven Low</span><span class="detail-val">${(trade.bf_lower + trade.premium).toFixed(1)}</span></div>
        <div class="detail-row"><span class="detail-label">Breakeven High</span><span class="detail-val">${(trade.bf_upper - trade.premium).toFixed(1)}</span></div>
        <div class="detail-row"><span class="detail-label">Profit Zone</span><span class="detail-val">${(trade.bf_lower+trade.premium).toFixed(0)} – ${(trade.bf_upper-trade.premium).toFixed(0)}</span></div>
      </div>
    </div>
  `;

  createPayoffChart(trade, spxPrice);
  renderBFViz(trade, spxPrice);
}

// ─── Ticker (live updates every 30s) ─────────────────────────────────────────
async function tick() {
  updateLiveBadge();

  await loadSPXHistory();
  await loadSignals();
  rebuildSPXChart();

  // Re-check trade state every tick — catches trigger/close without page refresh
  const prevTriggered = trade?.triggered;
  const prevStatus = trade?.status;
  await loadTrade();
  const stateChanged = (trade?.triggered !== prevTriggered) || (trade?.status !== prevStatus);
  if (stateChanged) { render(); }

  await refreshSPX();

  // Update stat cards and charts in-place with latest SPX price
  if (spxPrice !== null && trade && trade.triggered) {
    const pl = computePL(trade, spxPrice);
    const statPL = document.getElementById('statPL');
    if (statPL) { statPL.textContent = fmt$(pl); statPL.className = 'stat-value ' + plClass(pl); }
    const statPLSub = document.getElementById('statPLSub');
    if (statPLSub) statPLSub.textContent = pl >= 0 ? 'Profit' : 'Loss';
    const statSPX = document.getElementById('statSPX');
    if (statSPX) statSPX.textContent = fmtSpx(spxPrice);
    const intrinsic = Math.min(Math.max(0, Math.min(spxPrice - trade.bf_lower, trade.bf_upper - spxPrice)), (trade.bf_upper - trade.bf_lower) / 2);
    const statI = document.getElementById('statIntrinsic');
    if (statI) statI.textContent = '$' + (intrinsic * 100).toFixed(0);
    const statISub = document.getElementById('statIntrinsicSub');
    if (statISub) statISub.textContent = intrinsic.toFixed(2) + ' per share';
    renderBFViz(trade, spxPrice);
    updatePayoffChart(spxPrice);
  }

  updateSPXTicker();

  // Update SPX data age indicator
  const ageEl = document.getElementById('spxAge');
  if (ageEl && lastSpxTimestamp) {
    const ageSecs = Math.round((Date.now() - lastSpxTimestamp) / 1000);
    if (ageSecs < 60) ageEl.textContent = ageSecs + 's ago';
    else ageEl.textContent = Math.round(ageSecs / 60) + 'm ago';
    ageEl.style.color = ageSecs > 120 ? 'var(--red)' : 'var(--text3)';
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    checkOAuthCallback();
    await Promise.all([loadTrade(), loadSPXHistory(), loadSignals()]);
    updateLiveBadge();
    createSPXChart();
    rebuildSPXChart();
    render();
    await tick();
    pollTimer = setInterval(tick, 30_000);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        clearInterval(pollTimer);
        pollTimer = null;
      } else {
        tick();
        pollTimer = setInterval(tick, 30_000);
      }
    });
  } catch (err) {
    console.error('[Σ3] init failed:', err);
    const main = document.getElementById('mainContent');
    if (main) {
      main.innerHTML = `<div class="no-trade"><div class="no-trade-icon">⚠️</div><div class="no-trade-title">Failed to load</div><div class="no-trade-sub">${err.message || 'Unknown error'} — try refreshing.</div></div>`;
    }
  }
}

init();
</script>
