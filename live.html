// ─── M8BF Windows ────────────────────────────────────────────────────────────
const M8BF_WINDOWS = {
  1: { label: 'Monday',    start: '11:00', end: '11:30' },
  2: { label: 'Tuesday',   start: '13:30', end: '14:00' },
  3: { label: 'Wednesday', start: '12:00', end: '12:30' },
  4: { label: 'Thursday',  start: '11:00', end: '11:30' },
  5: { label: 'Friday',    start: '13:00', end: '13:30' },
};

function getNextWindow() {
  const now = getNowET();
  // Try up to 7 days ahead to find the next upcoming window
  for (let offset = 0; offset < 7; offset++) {
    const d = new Date(now);
    d.setDate(d.getDate() + offset);
    const dow = d.getDay();
    const win = M8BF_WINDOWS[dow];
    if (!win) continue;
    // Parse window end time
    const [endH, endM] = win.end.split(':').map(Number);
    const winEndMins = endH * 60 + endM;
    const nowMins = now.getHours() * 60 + now.getMinutes();
    // If same day, only show if window hasn't ended yet
    if (offset === 0 && nowMins >= winEndMins) continue;
    return win;
  }
  return null;
}

// ─── Payoff / Risk Profile Chart ─────────────────────────────────────────────
function createPayoffChart(trade, spxNow) {
  const ctx = document.getElementById('payoffCanvas');
  if (!ctx) return;
  if (payoffChart) { payoffChart.destroy(); payoffChart = null; }

  const { bf_lower, bf_upper, premium } = trade;
  const wing = (bf_upper - bf_lower) / 2;
  const pad  = 70;
  const lo   = Math.floor(bf_lower - pad);
  const hi   = Math.ceil(bf_upper  + pad);

  const beLow  = +(bf_lower + premium).toFixed(1);
  const beHigh = +(bf_upper - premium).toFixed(1);

  const labels = [], payoffData = [];
  for (let v = lo; v <= hi; v++) {
    labels.push(v);
    const intr = Math.max(0, Math.min(v - bf_lower, bf_upper - v));
    payoffData.push(Math.round((Math.min(intr, wing) - premium) * 100));
  }

  // Custom plugin — draws SPX vertical line + breakeven markers
  const overlayPlugin = {
    id: 'payoffOverlay',
    afterDraw(chart) {
      const { spxNow, beLow, beHigh } = chart._opts || {};
      const { ctx: cx, chartArea: ca, scales } = chart;

      // Breakeven lines
      for (const be of [beLow, beHigh]) {
        if (be == null) continue;
        const idx = Math.round(be - lo);
        if (idx < 0 || idx >= labels.length) continue;
        const x = scales.x.getPixelForValue(idx);
        cx.save();
        cx.beginPath(); cx.moveTo(x, ca.top); cx.lineTo(x, ca.bottom);
        cx.strokeStyle = 'rgba(74,222,128,.55)'; cx.lineWidth = 1;
        cx.setLineDash([3, 4]); cx.stroke();
        cx.font = '600 9px Inter'; cx.fillStyle = '#4ade80';
        cx.textAlign = 'center';
        cx.fillText('BE ' + be.toFixed(0), x, ca.top + 11);
        cx.restore();
      }

      // SPX current price line
      if (spxNow != null) {
        const idx = Math.round(spxNow - lo);
        if (idx >= 0 && idx < labels.length) {
          const x = scales.x.getPixelForValue(idx);
          cx.save();
          cx.beginPath(); cx.moveTo(x, ca.top); cx.lineTo(x, ca.bottom);
          cx.strokeStyle = '#fbbf24'; cx.lineWidth = 2;
          cx.setLineDash([6, 3]); cx.stroke();
          cx.font = 'bold 10px JetBrains Mono'; cx.fillStyle = '#fbbf24';
          cx.textAlign = 'center';
          cx.fillText(spxNow.toFixed(0), x, ca.bottom + 14);
          cx.restore();
        }
      }
    }
  };

  const c = chartColors();
  payoffChart = new Chart(ctx, {
    type: 'line',
    plugins: [overlayPlugin],
    data: {
      labels,
      datasets: [
        {
          data: payoffData,
          borderColor: '#818cf8',
          borderWidth: 2.5,
          pointRadius: 0,
          fill: false,
          tension: 0,
        },
        {
          data: labels.map(() => 0),
          borderColor: c.zero,
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => 'SPX: ' + items[0].label,
            label: item => item.datasetIndex === 0 ? 'P&L: ' + fmt$(item.parsed.y) : null,
          }
        }
      },
      scales: {
        x: {
          ticks: { color: c.text, font: { family: 'JetBrains Mono', size: 10 }, maxTicksLimit: 8, callback(v) { return this.getLabelForValue(v); } },
          grid: { color: c.grid },
        },
        y: {
          afterFit: axis => { axis.width = 68; },
          ticks: { color: c.text, font: { family: 'JetBrains Mono', size: 10 }, callback: v => fmt$(v) },
          grid: { color: c.grid },
        }
      }
    }
  });
  payoffChart._opts = { spxNow, beLow, beHigh };
}
function updatePayoffChart(spxNow) {
  if (!payoffChart) return;
  payoffChart._opts = { ...payoffChart._opts, spxNow };
  payoffChart.update('none');
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
// Safari-safe ET conversion. new Date(x.toLocaleString('en-US',{timeZone:
// 'America/New_York'})) returns Invalid Date on iPhone/WebKit (U+202F before
// AM/PM that Safari's parser rejects; Chrome/V8 tolerate it). formatToParts +
// numeric Date ctor has no string parse → byte-identical on V8/Chrome
// (verified), works on Safari.
function _toETSafe(d){
  const dt = (d instanceof Date) ? d : new Date(d);
  const p = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York',
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hourCycle:'h23' })
    .formatToParts(dt).reduce((a,x)=>(a[x.type]=x.value,a),{});
  return new Date(+p.year, +p.month-1, +p.day, +p.hour, +p.minute, +p.second);
}

function isTradeToday() {
  if (!trade || !trade.date) return false;
  const now = new Date();
  const et = _toETSafe(now);
  const todayStr = et.getFullYear() + '-' + String(et.getMonth()+1).padStart(2,'0') + '-' + String(et.getDate()).padStart(2,'0');
  return trade.date === todayStr;
}

function render() {
  const main = document.getElementById('mainContent');
  if (!trade || !trade.triggered || !isTradeToday()) {
    document.getElementById('spxChartSection').style.display = 'none';
    const now = getNowET();
    const dow = now.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const mins = now.getHours() * 60 + now.getMinutes();
    const isMarketHours = !isWeekend && mins >= 570 && mins < 960;
    const win = getNextWindow();
    const serverTimeET = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    let badge, badgeClass, statusText;
    if (isWeekend) {
      badge = 'CLOSED'; badgeClass = 'skip';
      statusText = 'Market closed (weekend). Next M8BF window shown above.';
    } else if (!isMarketHours) {
      badge = 'CLOSED'; badgeClass = 'skip';
      statusText = 'Market closed. M8BF triggers automatically inside its weekday window during market hours.';
    } else if (trade?.status === 'banned') {
      // CPI / EOM / EOM-1 / OPEX-1 / VIX-exp / earnings / NM-Straddle day
      badge = 'SKIP'; badgeClass = 'skip';
      statusText = trade.reason || 'No M8BF today (banned day)';
    } else if (trade?.status === 'no_signal') {
      // Window passed, no qualifying Discord signal arrived
      badge = 'NO SIGNAL'; badgeClass = 'skip';
      statusText = 'M8BF window passed without a qualifying signal. No trade today.';
    } else if (trade?.status === 'waiting') {
      // Pre-window OR in-window with no signal yet — same UX, different cause
      badge = 'WAITING SIGNAL'; badgeClass = 'pending';
      statusText = trade.window
        ? `Monitoring Discord signals during ${trade.window} ET window — trade appears automatically when triggered.`
        : 'Monitoring Discord signals — M8BF trade card appears automatically when triggered.';
    } else {
      badge = 'WAITING SIGNAL'; badgeClass = 'pending';
      statusText = 'Monitoring Discord signals — M8BF trade card appears automatically when triggered.';
    }

    const winLine = win
      ? `${win.label} · ${win.start} – ${win.end} ET`
      : '9:32 AM ET';

    // Match the diag-card pattern (BOBF/Straddle/Diagonal) so all four
    // strategy cards look the same in their waiting state.
    main.innerHTML = `
      <div class="diag-card">
        <div class="diag-header">
          <div class="diag-title"><span>M8BF</span> · ${winLine}</div>
          <span class="diag-badge ${badgeClass}">${badge}</span>
          <div style="flex:1"></div>
          <span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">${serverTimeET} ET</span>
        </div>
        <div style="font-size:13px;color:var(--text2);padding:6px 0;">${statusText}</div>
      </div>
    `;
    return;
  }

  // Compact M8BF card mirroring BOBF's .diag-card layout. CRITICAL: keep the
  // same element IDs the tick() in-place patches expect (#statPL, #statPLSub,
  // #statSPX, #statIntrinsic, #statIntrinsicSub) so live SPX/PnL keep updating
  // every 30s without touching tick() or init(). renderBFViz / updatePayoffChart
  // are harmless no-ops here — their target DOM (bfViz / payoffCanvas) is gone
  // and both helpers early-return on null.
  document.getElementById('spxChartSection').style.display = 'none';

  const currentPL = (trade.status === 'closed' && trade.final_pl != null)
    ? trade.final_pl
    : m8bfLivePL(trade, spxPrice);

  const currentIntrinsic = spxPrice !== null
    ? Math.min(Math.max(0, Math.min(spxPrice - trade.bf_lower, trade.bf_upper - spxPrice)), (trade.bf_upper - trade.bf_lower) / 2)
    : null;

  const debitDelta = (currentIntrinsic != null) ? (currentIntrinsic - trade.premium) : null;
  const deltaClass = (debitDelta == null) ? '' : debitDelta > 0 ? 'diag-pl-pos' : debitDelta < 0 ? 'diag-pl-neg' : '';
  const plCls      = currentPL == null ? '' : currentPL > 0 ? 'diag-pl-pos' : currentPL < 0 ? 'diag-pl-neg' : '';

  let badge, badgeClass, statusText;
  if (trade.status === 'closed') {
    badge = 'CLOSED'; badgeClass = (currentPL ?? 0) >= 0 ? 'open' : 'error';
    statusText = `M8BF settled · SPX close ${fmtSpx(trade.spx_close)} · final P&L ${fmt$(currentPL)}`;
  } else {
    badge = 'FILLED · LIVE'; badgeClass = 'open';
    statusText = `M8BF filled at $${trade.premium != null ? trade.premium.toFixed(2) : '—'} · ${trade.signal_time || '—'} ET${trade.window ? ' (window '+trade.window+')' : ''}`;
  }

  // trade.cp comes from the worker as a NUMBER (0=CALL, 1=PUT per schwab-proxy.js:584).
  // Older records might carry a string ('PUT'/'CALL') or be missing entirely. Handle all.
  const cpRaw = trade.cp;
  let cp = 'PUT', cpInitial = 'P';
  if (typeof cpRaw === 'number') { cp = cpRaw === 0 ? 'CALL' : 'PUT'; cpInitial = cp[0]; }
  else if (typeof cpRaw === 'string') { cp = cpRaw.toUpperCase(); cpInitial = cp[0]; }

  const wingWidth = (trade.bf_upper - trade.bf_lower) / 2;
  const beLow  = (trade.bf_lower + trade.premium).toFixed(0);
  const beHigh = (trade.bf_upper - trade.premium).toFixed(0);
  const maxProfit = Math.round((wingWidth - trade.premium) * 100);

  main.innerHTML = `
    <div class="diag-card">
      <div class="diag-header">
        <div class="diag-title"><span>M8BF</span> · ${trade.signal_time || trade.window || '—'} ET</div>
        <span class="diag-badge ${badgeClass}">${badge}</span>
        ${(window._tos.m8bf = trade.bf_lower ? `BUY +1 BUTTERFLY SPX 100 (Weeklys) ${tosDate(trade.date)} ${_tk(trade.bf_lower)}/${_tk(trade.center)}/${_tk(trade.bf_upper)} ${trade.cp ? 'PUT' : 'CALL'} @${trade.premium?.toFixed(2)} LMT` : null) ? tosBtn('m8bf') : ''}
        <div style="flex:1"></div>
        ${trade.t1 != null ? `<span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">T1 ${trade.t1} · spread ${trade.center - trade.bf_lower} · max +$${maxProfit}</span>` : ''}
      </div>

      <div class="diag-grid">
        <div class="diag-stat">
          <div class="diag-stat-label">${(trade.status === 'closed' || trade.settled) ? 'Final' : 'Live'} P&amp;L</div>
          <div class="diag-stat-value ${plCls}" id="statPL">${currentPL != null ? fmt$(currentPL) : '—'}</div>
          <div class="diag-stat-sub" id="statPLSub">${currentPL == null ? '' : trade.settled ? 'Settled at close' : currentPL >= 0 ? 'Profit' : 'Loss'}</div>
        </div>
        <div class="diag-stat">
          <div class="diag-stat-label">SPX</div>
          <div class="diag-stat-value" id="statSPX">${spxPrice != null ? fmtSpx(spxPrice) : (trade.spx_close != null ? fmtSpx(trade.spx_close) : '—')}</div>
          <div class="diag-stat-sub">Center ${trade.center}</div>
        </div>
        <div class="diag-stat">
          <div class="diag-stat-label">Entry debit</div>
          <div class="diag-stat-value">$${Math.round(trade.premium*100)}</div>
          <div class="diag-stat-sub">$${trade.premium.toFixed(2)} mid</div>
        </div>
        <div class="diag-stat">
          <div class="diag-stat-label">${trade.status === 'closed' ? 'Settled' : 'Current'}</div>
          <div class="diag-stat-value" id="statIntrinsic">${currentIntrinsic != null ? '$' + Math.round(currentIntrinsic*100) : '—'}</div>
          <div class="diag-stat-sub" id="statIntrinsicSub">${currentIntrinsic != null ? currentIntrinsic.toFixed(2) + ' per share' : ''}</div>
        </div>
      </div>

      <div class="diag-position">
        <div class="diag-pos-title">M8 Butterfly · 1× (qty 1 / 2 / 1)</div>
        <div class="diag-pos-headline">SPX ${trade.bf_lower} <span class="diag-slash">/</span> ${trade.center} <span class="diag-slash">/</span> ${trade.bf_upper} <span style="font-size:13px;color:var(--text3);">${cp}</span></div>
        <div class="diag-pos-subline">${trade.date || '—'} · 0DTE · wing ±${wingWidth} · BE ${beLow}–${beHigh}</div>
        <div class="diag-pos-legs" style="grid-template-columns:1fr 1fr 1fr;">
          <div class="diag-pos-leg long">
            <div class="diag-pos-leg-side">+1 Long lower</div>
            <div class="diag-pos-leg-strike">${trade.bf_lower}${cpInitial}</div>
            <div class="diag-pos-leg-meta">wing</div>
          </div>
          <div class="diag-pos-leg short">
            <div class="diag-pos-leg-side">−2 Short body</div>
            <div class="diag-pos-leg-strike">${trade.center}${cpInitial}</div>
            <div class="diag-pos-leg-meta">body</div>
          </div>
          <div class="diag-pos-leg long">
            <div class="diag-pos-leg-side">+1 Long upper</div>
            <div class="diag-pos-leg-strike">${trade.bf_upper}${cpInitial}</div>
            <div class="diag-pos-leg-meta">wing</div>
          </div>
        </div>
        ${currentIntrinsic != null ? `
        <div class="diag-pos-pricing">
          <div class="diag-pos-price"><div class="diag-pos-price-label">Entry debit</div><div class="diag-pos-price-value">$${trade.premium.toFixed(2)}</div></div>
          <div class="diag-pos-price"><div class="diag-pos-price-label">${trade.status === 'closed' ? 'Settled' : 'Current'}</div><div class="diag-pos-price-value">$${currentIntrinsic.toFixed(2)}</div></div>
          <div class="diag-pos-price"><div class="diag-pos-price-label">Δ vs entry</div><div class="diag-pos-price-value ${deltaClass}">${debitDelta > 0 ? '+' : ''}${debitDelta.toFixed(2)}</div></div>
        </div>` : ''}
      </div>

      <div class="diag-meta">
        <span>${statusText}</span>
      </div>
    </div>
  `;
}

// ─── Ticker (live updates every 30s) ─────────────────────────────────────────
async function tick() {
  updateLiveBadge();

  await loadSPXHistory();
  await loadSignals();
  rebuildSPXChart();

  // Re-check trade state every tick — catches trigger/close without page refresh
  const prevTriggered = trade?.triggered;
  const prevStatus = trade?.status;
  await Promise.all([loadTrade(), loadDiagonal(), loadStraddle(), loadBobf(), loadGxbf(), loadTail(), loadScalp()]);
  // Wrap each render so the user's "show per-leg fills" <details> toggle
  // doesn't reset every 30s tick.
  preserveDetailsState('diagonalSection', renderDiagonal);
  preserveDetailsState('straddleSection', renderStraddle);
  preserveDetailsState('bobfSection',     renderBobf);
  preserveDetailsState('gxbfSection',     renderGxbf);
  preserveDetailsState('tailSection',     renderTail);
  preserveDetailsState('scalpSection',    renderScalp);
  const stateChanged = (trade?.triggered !== prevTriggered) || (trade?.status !== prevStatus);
  if (stateChanged) { render(); }

  await refreshSPX();

  // Update stat cards and charts in-place with latest SPX price
  if (spxPrice !== null && trade && trade.triggered) {
    const pl = m8bfLivePL(trade, spxPrice);
    const statPL = document.getElementById('statPL');
    if (statPL) { statPL.textContent = fmt$(pl); statPL.className = 'stat-value ' + plClass(pl); }
    const statPLSub = document.getElementById('statPLSub');
    if (statPLSub) statPLSub.textContent = pl >= 0 ? 'Profit' : 'Loss';
    const statSPX = document.getElementById('statSPX');
    if (statSPX) statSPX.textContent = fmtSpx(spxPrice);
    const intrinsic = Math.min(Math.max(0, Math.min(spxPrice - trade.bf_lower, trade.bf_upper - spxPrice)), (trade.bf_upper - trade.bf_lower) / 2);
    const statI = document.getElementById('statIntrinsic');
    if (statI) statI.textContent = '$' + (intrinsic * 100).toFixed(0);
    const statISub = document.getElementById('statIntrinsicSub');
    if (statISub) statISub.textContent = intrinsic.toFixed(2) + ' per share';
    renderBFViz(trade, spxPrice);
    updatePayoffChart(spxPrice);
  }

  updateSPXTicker();

  // Update SPX data age indicator
  const ageEl = document.getElementById('spxAge');
  if (ageEl && lastSpxTimestamp) {
    const ageSecs = Math.round((Date.now() - lastSpxTimestamp) / 1000);
    if (ageSecs < 60) ageEl.textContent = ageSecs + 's ago';
    else ageEl.textContent = Math.round(ageSecs / 60) + 'm ago';
    ageEl.style.color = ageSecs > 120 ? 'var(--red)' : 'var(--text3)';
  }

  // Refresh the left-side total panel after every tick (cheap, just reads state).
  try { renderLiveTotal(); } catch (e) { console.warn('renderLiveTotal failed:', e); }

  // Active cards stay at top, skip cards drop to the bottom.
  try { reorderStrategySections(); } catch (e) { console.warn('reorderStrategySections failed:', e); }
}

// ─── Move "skip / no-trade-today" strategy cards to the bottom ───────────────
// Active = strategy has a currently-open OR closed-today trade record.
// Inactive = "No X today" / banned / no-signal / RSI-blocked / etc. — uses a
// SKIP badge in its render and provides no actionable info, so it drops below.
// liveTotalSection always stays at the very top (not touched here).
function reorderStrategySections() {
  const nowET = getNowET();
  const today = `${nowET.getFullYear()}-${String(nowET.getMonth()+1).padStart(2,'0')}-${String(nowET.getDate()).padStart(2,'0')}`;
  const SECTIONS = [
    { id: 'mainContent',     active: () => !!(trade && trade.triggered) },
    { id: 'bobfSection',     active: () => !!bobf?.open || bobf?.lastClosed?.openDate === today },
    { id: 'gxbfSection',     active: () => !!gxbf?.open || gxbf?.lastClosed?.openDate === today },
    { id: 'straddleSection', active: () => !!straddle?.open || straddle?.lastClosed?.closeDate === today },
    { id: 'diagonalSection', active: () => !!diagonal?.open || diagonal?.lastClosed?.closeDate === today || diagonal?.lastClosed?.openDate === today },
    { id: 'tailSection',     active: () => !!tail?.active },
    { id: 'scalpSection',    active: () => !!(scalp?.status === 'GO' && scalp?.trade) },
  ];
  // Collect skip elements (preserve their original order)
  const skipEls = [];
  for (const s of SECTIONS) {
    const el = document.getElementById(s.id);
    if (!el) continue;
    if (el.style.display === 'none') continue;   // hidden = don't reorder
    try { if (!s.active()) skipEls.push(el); } catch (_) { /* treat error as inactive */ skipEls.push(el); }
  }
  // appendChild on an existing child MOVES it — sequential calls push each
  // skip element to the end while preserving relative order among themselves.
  for (const el of skipEls) el.parentNode.appendChild(el);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    checkOAuthCallback();
    await Promise.all([loadTrade(), loadSPXHistory(), loadSignals(), loadDiagonal(), loadStraddle(), loadBobf(), loadGxbf(), loadTail(), loadScalp()]);
    updateLiveBadge();
    createSPXChart();
    rebuildSPXChart();
    render();
    renderDiagonal();
    renderStraddle();
    renderBobf();
    renderGxbf();
    renderTail();
    renderScalp();
    try { renderLiveTotal(); } catch (e) { console.warn('renderLiveTotal init failed:', e); }
    try { reorderStrategySections(); } catch (e) { console.warn('reorderStrategySections init failed:', e); }
    await tick();
    pollTimer = setInterval(tick, 30_000);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        clearInterval(pollTimer);
        pollTimer = null;
      } else {
        tick();
        pollTimer = setInterval(tick, 30_000);
      }
    });
  } catch (err) {
    console.error('[Σ3] init failed:', err);
    const main = document.getElementById('mainContent');
    if (main) {
      main.innerHTML = `<div class="no-trade"><div class="no-trade-icon">⚠️</div><div class="no-trade-title">Failed to load</div><div class="no-trade-sub">${err.message || 'Unknown error'} — try refreshing.</div></div>`;
    }
  }
}

init();
</script>
