<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Σ3 — Today's Trades</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:#f1f5f9; --bg2:#ffffff; --bg3:#f8fafc;
      --border:#e2e8f0;
      --text:#1e293b; --text2:#475569; --text3:#94a3b8;
      --accent:#6366f1; --accent2:#818cf8;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
      --radius:12px; --radius-sm:8px;
      --green:#22c55e; --red:#ef4444; --yellow:#f59e0b;
    }
    [data-theme="dark"] {
      --bg:#0f172a; --bg2:#1e293b; --bg3:#162032;
      --border:#2d3f55;
      --text:#e2e8f0; --text2:#94a3b8; --text3:#475569;
      --accent:#818cf8; --accent2:#6366f1;
      --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
      --green:#4ade80; --red:#f87171; --yellow:#fbbf24;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

    /* HEADER */
    .header{display:flex;align-items:center;gap:16px;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;flex-wrap:wrap;}
    .logo{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);text-decoration:none;}
    .nav{display:flex;gap:4px;}
    .nav a{font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;color:var(--text2);text-decoration:none;transition:background .15s,color .15s;border:1px solid transparent;}
    .nav a:hover{background:var(--bg3);color:var(--text);}
    .nav a.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .header-spacer{flex:1;}
    .live-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text3);font-family:'JetBrains Mono',monospace;}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);}
    .live-dot.green{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
    .live-dot.yellow{background:var(--yellow);}
    .live-dot.red{background:var(--red);}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    .theme-toggle{background:var(--bg);border:1px solid var(--border);border-radius:20px;width:42px;height:22px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
    .theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--accent);transition:transform .2s;}
    [data-theme="light"] .theme-toggle::after{transform:translateX(20px);}

    /* MAIN LAYOUT */
    .main{max-width:1100px;margin:0 auto;padding:20px 24px;}

    /* NO TRADE STATE */
    .no-trade{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;text-align:center;}
    .no-trade-icon{font-size:48px;opacity:.3;}
    .no-trade-title{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--text2);}
    .no-trade-sub{font-size:13px;color:var(--text3);max-width:380px;line-height:1.6;}
    .no-trade-window{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;}
    .win-day{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);}
    .win-time{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);}

    /* STATS ROW */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
    .stat-card{padding:16px 18px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);box-shadow:var(--shadow);}
    .stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-family:'Inter',sans-serif;margin-bottom:6px;}
    .stat-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--text);}
    .stat-value.green{color:var(--green);}
    .stat-value.red{color:var(--red);}
    .stat-value.yellow{color:var(--yellow);}
    .stat-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;}

    /* CHART CARD */
    .chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
    .chart-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
    .chart-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text2);}
    .chart-header-spacer{flex:1;}
    .last-update{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
    .chart-wrap{position:relative;height:260px;}

    /* BUTTERFLY VIZ */
    .bf-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
    .bf-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:16px;}
    .bf-viz{position:relative;height:80px;}
    .bf-track{position:absolute;top:50%;left:0;right:0;height:4px;background:var(--border);border-radius:2px;transform:translateY(-50%);}
    .bf-fill{position:absolute;top:50%;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transform:translateY(-50%);transition:width .4s ease,left .4s ease;}
    .bf-label{position:absolute;top:50%;transform:translateX(-50%) translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;}
    .bf-label-line{width:2px;height:18px;background:var(--border);}
    .bf-label-line.accent{background:var(--accent);}
    .bf-label-line.spx{background:var(--yellow);height:24px;}
    .bf-label-val{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--text2);white-space:nowrap;}
    .bf-label-name{font-family:'Inter',sans-serif;font-size:9px;color:var(--text3);white-space:nowrap;}
    .bf-label.top .bf-label-line{order:2;}
    .bf-label.top .bf-label-val{order:1;}
    .bf-label.top .bf-label-name{order:0;}
    .bf-label.bot .bf-label-line{order:0;}
    .bf-label.bot .bf-label-val{order:1;}
    .bf-label.bot .bf-label-name{order:2;}

    /* TRADE DETAILS */
    .details-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
    .details-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px;}
    .details-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
    .detail-row{display:flex;flex-direction:column;gap:2px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border);}
    .detail-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-family:'Inter',sans-serif;}
    .detail-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text);}

    /* STATUS BAR */
    .status-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:20px;font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace;}
    .status-bar .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

    /* CLOSED BANNER */
    .closed-banner{padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:20px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;text-align:center;border:1px solid;}
    .closed-banner.win{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--green);}
    .closed-banner.loss{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red);}

    .footer{text-align:center;padding:24px;font-size:11px;color:var(--text3);}
    .footer a{color:var(--accent);text-decoration:none;}

    /* SPX LIVE CHART SECTION */
    /* Force the SPX dot chart hidden (per user request). !important defeats the
       inline style="display:''" that render()'s active-trade branch sets. */
    .spx-chart-section,#spxChartSection{display:none!important;}

    /* Total Live P&L card — sits in-flow above the strategy cards (same
       column width). All inner classes (.ltc-*) use JetBrains Mono for the
       monospace P&L look. */
    #liveTotalSection .diag-card{font-family:'JetBrains Mono',monospace;}
    .ltc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:6px;}
    .ltc-total{font-size:32px;font-weight:700;line-height:1.1;margin-bottom:14px;}
    .ltc-rows{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;}
    .ltc-row{display:flex;flex-direction:column;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;}
    .ltc-name{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:4px;}
    .ltc-pl{font-size:16px;font-weight:700;}
    .spx-chart-section{max-width:1100px;margin:20px auto 0;padding:0 24px;}
    .legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;}
    .legend-item{display:flex;align-items:center;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}

    /* SPX price ticker */
    .spx-ticker{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;}
    .spx-price{font-weight:700;color:var(--text);}
    .spx-chg.up{color:var(--green);}
    .spx-chg.dn{color:var(--red);}

    /* Schwab connect banner */
    .connect-banner{padding:10px 16px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);border-radius:var(--radius-sm);margin-bottom:20px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--accent);}
    .connect-banner a{color:var(--accent);font-weight:600;margin-left:auto;text-decoration:none;padding:4px 10px;border:1px solid var(--accent);border-radius:6px;font-family:'JetBrains Mono',monospace;}
    .connect-banner a:hover{background:var(--accent);color:#fff;}
    .hidden{display:none!important;}

    @media(max-width:768px) {
      .nav{flex-wrap:wrap;}
      .nav a{padding:8px 10px;}
      .header { padding:10px 14px; gap:8px; }
      .main { padding:12px; }
      .stats-row { grid-template-columns:1fr 1fr; gap:8px; }
      .stat-card { padding:10px 12px; }
      .stat-value { font-size:16px; }
      .chart-wrap { height:180px; }
      .details-grid { grid-template-columns:1fr 1fr; }
    }
  </style>
<script src="nav.js?v=20260704" defer></script>
</head>

<script>
// ─── Diagonal section styles ────────────────────────────────────────────
(function injectDiagonalCSS() {
  const css = `
    .diag-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:16px;position:relative;overflow:hidden;}
    /* Per-strategy color accents — top border + subtle bg tint so each card
       reads as its own strategy at a glance. M8BF stays violet (existing
       accent), the three new cards each get their own hue. */
    #bobfSection      .diag-card{border-top:3px solid #fbbf24;background:linear-gradient(180deg,rgba(251,191,36,.06) 0%,var(--bg2) 60%);}
    #bobfSection      .diag-title span{color:#fbbf24;}
    #straddleSection  .diag-card{border-top:3px solid #22d3ee;background:linear-gradient(180deg,rgba(34,211,238,.06) 0%,var(--bg2) 60%);}
    #straddleSection  .diag-title span{color:#22d3ee;}
    #diagonalSection  .diag-card{border-top:3px solid #fb7185;background:linear-gradient(180deg,rgba(251,113,133,.06) 0%,var(--bg2) 60%);}
    #diagonalSection  .diag-title span{color:#fb7185;}
    #tailSection      .diag-card{border-top:3px solid #ef4444;background:linear-gradient(180deg,rgba(239,68,68,.08) 0%,var(--bg2) 60%);}
    #tailSection      .diag-title span{color:#ef4444;}
    #scalpSection     .diag-card{border-top:3px solid #bc8cff;background:linear-gradient(180deg,rgba(188,140,255,.07) 0%,var(--bg2) 60%);}
    #scalpSection     .diag-title span{color:#bc8cff;}
    /* M8BF lives inside #mainContent — apply violet accent to both the
       butterfly card (when triggered) and the diag-card (when waiting). */
    #mainContent .bf-card,
    #mainContent .diag-card{border-top:3px solid var(--accent);background:linear-gradient(180deg,rgba(129,140,248,.06) 0%,var(--bg2) 60%);}
    #mainContent .diag-title span{color:var(--accent);}
    .diag-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    .diag-title{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--text);letter-spacing:.04em;text-transform:uppercase;}
    .diag-title span{color:var(--accent);}
    .diag-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:11px;letter-spacing:.06em;text-transform:uppercase;}
    .diag-badge.open{background:rgba(34,197,94,.16);color:#22c55e;border:1px solid rgba(34,197,94,.35);}
    .diag-badge.skip{background:rgba(148,163,184,.16);color:var(--text2);border:1px solid var(--border);}
    .diag-badge.pending{background:rgba(251,191,36,.16);color:var(--yellow);border:1px solid rgba(251,191,36,.35);}
    .diag-badge.error{background:rgba(239,68,68,.16);color:#ef4444;border:1px solid rgba(239,68,68,.35);}
    .diag-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:12px;}
    .diag-stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;}
    .diag-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:4px;}
    .diag-stat-value{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--text);}
    .diag-stat-sub{font-size:10px;color:var(--text3);margin-top:2px;}
    .diag-pl-pos{color:#22c55e;}
    .diag-pl-neg{color:#ef4444;}
    .diag-legs{margin-top:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
    .diag-legs-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:8px;}
    .diag-leg{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px dashed var(--border);font-size:13px;}
    .diag-leg:last-child{border-bottom:none;}
    .diag-leg .side{font-weight:700;font-size:11px;padding:2px 7px;border-radius:4px;letter-spacing:.04em;}
    .diag-leg .side.short{background:rgba(239,68,68,.15);color:#ef4444;}
    .diag-leg .side.long{background:rgba(129,140,248,.15);color:var(--accent);}
    .diag-leg .desc{flex:1;font-family:'JetBrains Mono',monospace;}
    .diag-leg .price{font-family:'JetBrains Mono',monospace;color:var(--text2);}
    /* New combined-position view */
    .diag-position{margin-top:12px;background:linear-gradient(135deg,var(--bg) 0%,rgba(129,140,248,.04) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
    .diag-pos-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px;}
    .diag-pos-headline{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.01em;}
    .diag-pos-headline .diag-slash{color:var(--text3);margin:0 4px;font-weight:400;}
    .diag-pos-subline{font-size:11px;color:var(--text3);margin-bottom:16px;font-family:'JetBrains Mono',monospace;}
    .diag-pos-legs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
    @media(max-width:600px){.diag-pos-legs{grid-template-columns:1fr;}}
    .diag-pos-leg{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;}
    .diag-pos-leg.short{border-left:3px solid #ef4444;}
    .diag-pos-leg.long{border-left:3px solid var(--accent);}
    .diag-pos-leg-side{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
    .diag-pos-leg.short .diag-pos-leg-side{color:#ef4444;}
    .diag-pos-leg.long .diag-pos-leg-side{color:var(--accent);}
    .diag-pos-leg-strike{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--text);line-height:1.1;}
    .diag-pos-leg-meta{font-size:11px;color:var(--text3);margin-top:4px;font-family:'JetBrains Mono',monospace;}
    .diag-pos-pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:12px;border-top:1px solid var(--border);}
    .diag-pos-price{text-align:center;}
    .diag-pos-price-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:3px;}
    .diag-pos-price-value{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--text);}
    .diag-meta{font-size:10px;color:var(--text3);margin-top:10px;font-family:'JetBrains Mono',monospace;display:flex;gap:14px;flex-wrap:wrap;}
    .diag-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-top:10px;}
  `;
  const style = document.createElement('style');
  style.textContent = css;
  document.head.appendChild(style);
})();

// ─── Theme ───────────────────────────────────────────────────────────────────
const html = document.documentElement;
const saved = localStorage.getItem('theme') || 'dark';

// ─── Fetch with Retry ───────────────────────────────────────────────────────
async function fetchWithRetry(url, opts = {}, retries = 3, baseDelay = 1000) {
  for (let i = 0; i <= retries; i++) {
    try {
      const resp = await fetch(url, opts);
      if (resp.ok || resp.status < 500) return resp;
      if (i < retries) await new Promise(r => setTimeout(r, baseDelay * 2 ** i));
    } catch (e) {
      if (i === retries) throw e;
      await new Promise(r => setTimeout(r, baseDelay * 2 ** i));
    }
  }
}

// ─── Market Hours (ET) ───────────────────────────────────────────────────────
function getNowET() {
  return _toETSafe(new Date());
}
function getMarketStatus() {
  const now = getNowET();
  const h = now.getHours(), m = now.getMinutes();
  const mins = h * 60 + m;
  const day = now.getDay();
  if (day === 0 || day === 6) return 'closed';
  if (mins < 9 * 60 + 30) return 'pre-market';
  if (mins <= 16 * 60) return 'open';
  return 'closed';
}

// ─── P&L Formula ─────────────────────────────────────────────────────────────
function computePL(trade, spxNow) {
  const { bf_lower, bf_upper, premium } = trade;
  const wing = (bf_upper - bf_lower) / 2;
  const intrinsic = Math.max(0, Math.min(spxNow - bf_lower, bf_upper - spxNow));
  const clipped = Math.min(intrinsic, wing);
  return Math.round((clipped - premium) * 100);
}

// Live M8BF P&L. Prefer the REAL spread mid (trade.currentValue, marked to
// market every tick by the worker's refreshM8bfLiveQuotes) over computePL's
// at-expiration intrinsic — the intrinsic overstates intraday profit while
// the short body still carries extrinsic (it's only exact at the 4pm settle).
// Falls back to the intrinsic formula when no live quote is available
// (pre-quote / chain miss / cron stall) so behavior is never worse than before.
function m8bfLivePL(trade, spxNow) {
  if (trade && trade.currentValue != null && trade.premium != null) {
    return Math.round((trade.currentValue - trade.premium) * 100);
  }
  return (spxNow !== null && spxNow !== undefined) ? computePL(trade, spxNow) : null;
}

// ─── SPX History + Signals fetch ─────────────────────────────────────────────
function todayET() {
  // getNowET() carries ET wall-clock values in LOCAL date fields — reading it
  // back through toISOString() re-applies the local→UTC offset and flips the
  // date after ~20:00 ET (blank chart/markers in the evening, audit 2026-07-10).
  // Read the fields directly, same as isTradeToday().
  const d = getNowET();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
const RAW = 'https://raw.githubusercontent.com/rava8989/brave/main/';
const PROXY = 'https://schwab-proxy.ravamt4.workers.dev';
async function loadSPXHistory() {
  try {
    // Primary: fetch from worker (live KV data, updated every 2 min)
    const r = await fetchWithRetry(PROXY + '/spx-history', { cache: 'no-store' });
    if (r.ok) {
      const d = await r.json();

        return;
      }

  // Fallback: GitHub raw (legacy, may be stale)
  try {

    if (!r.ok) return;
    const d = await r.json();
    if (d.date !== todayET()) return;
    spxHistory = d.data || [];
  } catch (e) { console.warn('[live] spx-history GH-raw fallback failed:', e); }
}
async function loadSignals() {
  try {
    const r = await fetchWithRetry('https://schwab-proxy.ravamt4.workers.dev/signals', { cache: 'no-store' });
    if (!r.ok) return;
    const d = await r.json();
    if (d.date !== todayET()) return;
    // Deduplicate by time — keep last entry if duplicates exist
    const sigMap = {};
    for (const s of (d.signals || [])) sigMap[s.time] = s;
    signalsToday = Object.values(sigMap).sort((a, b) => a.time.localeCompare(b.time));
  } catch (e) { console.warn('[live] /signals fetch failed:', e); }
}

function rebuildSPXChart() {
  if (!spxChart) createSPXChart();
  if (!spxChart) return;

  // Round a HH:MM string to nearest 5-min mark
  function snap5(t) {
    const [h, m] = t.split(':').map(Number);
    return `${String(h).padStart(2,'0')}:${String(Math.round(m/5)*5%60).padStart(2,'0')}`;
  }

  // Update chart title with date and ET label
  const titleEl = document.getElementById('spxChartTitle');
  if (titleEl) {
    const now = getNowET();
    const dateStr = now.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    titleEl.textContent = `SPX Live · M8BF Signals · ${dateStr} ET`;
  }

  // Build 5-min snapped maps
  const spxMap5 = {};
  for (const p of spxHistory) { spxMap5[snap5(p.time)] = p.price; }
  // Inject current live price so chart never looks frozen between history pushes
  if (spxPrice !== null) {
    const nowStr = getNowET().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    spxMap5[snap5(nowStr)] = spxPrice;
  }
  const sigMap5 = {};
  for (const s of signalsToday) { sigMap5[snap5(s.time)] = s; }

  // Merge time points from both sources, sorted
  const timeSet = new Set([
    ...Object.keys(spxMap5),
    ...Object.keys(sigMap5),
  ]);
  const times = Array.from(timeSet).sort();
  if (!times.length) return;

  spxChart.data.labels = times;
  spxChart.data.datasets[0].data = times.map(t => spxMap5[t] ?? null);
  spxChart.data.datasets[1].data = times.map(t => {
    const s = sigMap5[t];
    return s ? s.center : null;
  });

  // Fixed ±60 point buffer so the chart never feels claustrophobic
  const allPrices = [
    ...spxHistory.map(p => p.price),
    ...signalsToday.map(s => s.center),
  ].filter(Boolean);
  if (allPrices.length) {
    spxChart.options.scales.y.min = Math.min(...allPrices) - 25;
    spxChart.options.scales.y.max = Math.max(...allPrices) + 25;
    delete spxChart.options.scales.y.grace;
  }

  const last = spxHistory[spxHistory.length - 1];
  const lu = document.getElementById('spxChartUpdate');
  if (lu && last) lu.textContent = 'Updated ' + snap5(last.time) + ' ET';

  spxChart.update('none');
}
function updateSPXChartTheme() {
  if (!spxChart) return;
  const c = chartColors();
  spxChart.options.scales.x.ticks.color = c.text;
  spxChart.options.scales.x.grid.color = c.grid;
  spxChart.options.scales.y.ticks.color = c.text;
  spxChart.options.scales.y.grid.color = c.grid;

}

// ─── Helper: preserve <details> open state across full-card re-renders ──────
// Each strategy card uses sec.innerHTML = html.join('') every tick which blows
// away the user's "show per-leg fills" toggle state. Snapshot it pre-render
// and restore post-render so the toggle stays put.
function preserveDetailsState(secId, render) {
  const sec = document.getElementById(secId);
  const openIds = new Set();
  if (sec) {
    sec.querySelectorAll('details[open]').forEach((d, i) => {
      openIds.add(d.dataset.detailKey || `idx-${i}`);
    });
  }
  render();
  if (sec) {
    sec.querySelectorAll('details').forEach((d, i) => {
      const key = d.dataset.detailKey || `idx-${i}`;
      if (openIds.has(key)) d.open = true;
    });
  }
}

    const badgeClass = isNo ? 'skip' : 'pending';
    html.push(`<span class="diag-badge ${badgeClass}">${badge}</span>`);
    html.push(`<div style="flex:1"></div>`);
    html.push(`<span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">${SCALP_LOTS} lots · paper</span>`);
    html.push(`</div>`);
    html.push(`<div style="font-size:13px;color:var(--text2);padding:2px 0;">${scalp.headline || 'waiting for the 12:00 ET check'}</div>`);
    if (scalp.detail) html.push(`<div style="font-size:11.5px;color:var(--text3);margin-top:4px;">${scalp.detail}</div>`);
  }
  html.push(`</div>`);
  sec.innerHTML = html.join('');
}

function renderBobf() {
  const sec = document.getElementById('bobfSection');
  if (!bobf) { sec.style.display = 'none'; return; }
  const { open, lastClosed, doneState, date, isWeekend, isHoliday, serverTimeET, windowET, maxPremiumFriday, static: bobfStatic } = bobf;

  if (isWeekend || isHoliday) {
    if (!lastClosed || lastClosed.closeDate !== date) { sec.style.display = 'none'; return; }
  }

  // Pre-window or no trade yet — show waiting placeholder
  if (!open && !(lastClosed && lastClosed.closeDate === date)) {
    sec.style.display = '';
    let placeholderText, placeholderBadge = 'WAITING SIGNAL', placeholderClass = 'pending';
    if (doneState && doneState.startsWith('blackout')) {
      placeholderText = `No BOBF today — ${doneState.replace('blackout:','')}`;
      placeholderBadge = 'SKIP'; placeholderClass = 'skip';
    } else if (doneState && doneState.startsWith('no-type')) {
      placeholderText = `No BOBF today — ${doneState.replace('no-type:','')}`;
      placeholderBadge = 'SKIP'; placeholderClass = 'skip';
    } else if (doneState && doneState.startsWith('rsi')) {
      placeholderText = `No BOBF today — RSI ${doneState.replace('rsi:','')}`;
      placeholderBadge = 'SKIP'; placeholderClass = 'skip';
    } else if (doneState && doneState.startsWith('data-stale')) {
      placeholderText = `Data stale — morning signal block failed to write today's SPX open. BOBF can't evaluate entry conditions until history is backfilled.`;
      placeholderBadge = 'STALE'; placeholderClass = 'skip';
    } else if (doneState === 'window-passed') {
      placeholderText = `Window closed — no BOBF qualified today`;
      placeholderBadge = 'NO TRADE'; placeholderClass = 'skip';
    } else if (doneState === 'expired') {
      placeholderText = `Working order expired at 12:15 ET — premium never met max debit`;
      placeholderBadge = 'NO FILL'; placeholderClass = 'skip';
    } else if (doneState && doneState !== 'filled') {
      // Defensive catch-all for any future done-state we forgot to map.
      placeholderText = `No BOBF today — ${doneState}`;
      placeholderBadge = 'SKIP'; placeholderClass = 'skip';
    } else if (bobfStatic && bobfStatic.label) {
      // Static filters passed — name today's BOBF type so the user knows what's loaded.
      placeholderText = `${bobfStatic.label} armed — entry window ${windowET} ET.`;
    } else {
      placeholderText = `BOBF entry window: ${windowET} ET.`;
    }
    // Static-filter readout (RSI · SMA5 · type) — always show when available so
    // the user can sanity-check today's gate state before the trade fires.
    let staticReadout = '';
    if (bobfStatic && bobfStatic.rsi14 != null && bobfStatic.sma5 != null) {
      const rsiVal = bobfStatic.rsi14.toFixed(1);
      const smaVal = bobfStatic.sma5.toFixed(0);
      const gateNote = bobfStatic.type === 'friday' ? ' · gate 40-65'
                     : bobfStatic.type === 'vix_down' ? ' · gate ≤70'
                     : '';
      staticReadout = `<span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">RSI ${rsiVal} · SMA5 ${smaVal}${gateNote}</span>`;
    }
    sec.innerHTML = `
      <div class="diag-card">
        <div class="diag-header">
          <div class="diag-title"><span>BOBF</span> · ${windowET} ET</div>
          <span class="diag-badge ${placeholderClass}">${placeholderBadge}</span>
          <div style="flex:1"></div>
          ${staticReadout}
          <span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-left:8px;">${serverTimeET} ET</span>
        </div>
        <div style="font-size:13px;color:var(--text2);padding:6px 0;">${placeholderText}</div>
      </div>`;
    return;
  }

  sec.style.display = '';
  const t = open || lastClosed;
  if (!t) { sec.style.display = 'none'; return; }

  let badge, badgeClass, statusText;
  switch (t.status) {
    case 'filled':
      badge = 'FILLED · LIVE'; badgeClass = 'open';
      statusText = `${t.label} · filled at $${t.fillDebit?.toFixed(2)} · ${t.fillTimeET} ET${t.maxDebit ? ' (max $'+t.maxDebit.toFixed(2)+')' : ''}`;
      break;
    case 'working':
      badge = 'WORKING'; badgeClass = 'pending';
      statusText = `${t.label} · working limit @ $${t.maxDebit?.toFixed(2)} · current $${t.currentValue?.toFixed(2)} · cancels 12:15 ET`;
      break;
    case 'expired':
      badge = 'NO FILL'; badgeClass = 'skip';
      statusText = `${t.label} · order expired 12:15 ET — premium never met max $${t.maxDebit?.toFixed(2)}`;
      break;
    case 'closed':
      badge = 'CLOSED'; badgeClass = t.pnl >= 0 ? 'open' : 'error';
      statusText = `${t.label} · settled SPX ${t.spxClose?.toFixed(2)} · final P&L ${fmt$(t.pnl)}`;
      break;
    default:
      badge = (t.status || 'OPEN').toUpperCase(); badgeClass = 'pending';
      statusText = `${t.label || 'BOBF'} · status ${t.status}`;
  }

  const debitDelta = (t.currentValue != null && t.entryDebit != null) ? (t.currentValue - t.entryDebit) : null;
  const deltaClass = (debitDelta == null) ? '' : debitDelta > 0 ? 'diag-pl-pos' : debitDelta < 0 ? 'diag-pl-neg' : '';
  const livePnl = t.status === 'filled' ? t.currentPnl : t.status === 'closed' ? t.pnl : null;
  const plClass = livePnl == null ? '' : livePnl > 0 ? 'diag-pl-pos' : livePnl < 0 ? 'diag-pl-neg' : '';

  const fmtExp = iso => {
    if (!iso) return '—';
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleString('en-US',{month:'short',day:'numeric'});
  };

  const html = [];
  html.push(`<div class="diag-card">`);
  html.push(`<div class="diag-header">`);
  html.push(`<div class="diag-title"><span>${t.label || 'BOBF'}</span> · ${t.openTimeET || windowET} ET</div>`);
  html.push(`<span class="diag-badge ${badgeClass}">${badge}</span>`);
  if (t.lowerStrike != null && t.expDate) {
    window._tos.bobf = `BUY +1 BUTTERFLY SPX 100 (Weeklys) ${tosDate(t.expDate)} ${_tk(t.lowerStrike)}/${_tk(t.bodyStrike)}/${_tk(t.upperStrike)} CALL @${(t.fillDebit ?? t.entryDebit)?.toFixed(2)} LMT`;
    html.push(tosBtn('bobf'));
  }
  html.push(`<div style="flex:1"></div>`);
  if (t.rsi14 != null && t.sma5 != null) {
    html.push(`<span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">RSI ${t.rsi14.toFixed(1)} · SMA5 ${t.sma5.toFixed(0)} · move +${t.moveUpPct?.toFixed(2)}%</span>`);
  }
  html.push(`</div>`);

  if (t.entryDebit != null) {
    html.push(`<div class="diag-grid">`);
    if (livePnl != null) {
      html.push(`<div class="diag-stat"><div class="diag-stat-label">${t.status === 'closed' ? 'Final' : 'Live'} P&L</div><div class="diag-stat-value ${plClass}">${fmt$(livePnl)}</div><div class="diag-stat-sub">${t.contracts} contract</div></div>`);
    } else {
      html.push(`<div class="diag-stat"><div class="diag-stat-label">P&L</div><div class="diag-stat-value">—</div><div class="diag-stat-sub">${t.status === 'working' ? 'pending fill' : ''}</div></div>`);
    }
    html.push(`<div class="diag-stat"><div class="diag-stat-label">SPX</div><div class="diag-stat-value">${t.currentSpot?.toFixed(2) ?? t.spxClose?.toFixed(2) ?? '—'}</div><div class="diag-stat-sub">Body ${t.bodyStrike}</div></div>`);
    html.push(`<div class="diag-stat"><div class="diag-stat-label">Entry debit</div><div class="diag-stat-value">$${(t.entryDebit*100).toFixed(0)}</div><div class="diag-stat-sub">$${t.entryDebit?.toFixed(2)} mid</div></div>`);
    if (t.currentValue != null) {
      html.push(`<div class="diag-stat"><div class="diag-stat-label">Current</div><div class="diag-stat-value">$${(t.currentValue*100).toFixed(0)}</div><div class="diag-stat-sub">${debitDelta != null ? `<span class="${deltaClass}">${debitDelta > 0 ? '+' : ''}${debitDelta.toFixed(2)}</span>` : ''}</div></div>`);
    }
    html.push(`</div>`);
  }

  // Position card: 3-leg butterfly (1 long lower, 2 short body, 1 long upper)
  html.push(`<div class="diag-position">`);
  html.push(`  <div class="diag-pos-title">OTM call butterfly · ${t.contracts || 1}× (qty 1 / 2 / 1)</div>`);
  html.push(`  <div class="diag-pos-headline">SPX ${t.lowerStrike} <span class="diag-slash">/</span> ${t.bodyStrike} <span class="diag-slash">/</span> ${t.upperStrike} <span style="font-size:13px;color:var(--text3);">CALL</span></div>`);
  html.push(`  <div class="diag-pos-subline">${fmtExp(t.expDate)} · 0DTE · spot ${t.spotEntry?.toFixed(2)}${t.currentSpot != null && t.currentSpot !== t.spotEntry ? ' → '+t.currentSpot.toFixed(2) : ''}</div>`);
  html.push(`  <div class="diag-pos-legs" style="grid-template-columns:1fr 1fr 1fr;">`);
  html.push(`    <div class="diag-pos-leg long">`);
  html.push(`      <div class="diag-pos-leg-side">+1 Long lower</div>`);
  html.push(`      <div class="diag-pos-leg-strike">${t.lowerStrike}C</div>`);
  html.push(`      <div class="diag-pos-leg-meta">$${t.entryLowerMid?.toFixed(2)}${t.currentLowerMid != null && t.currentLowerMid !== t.entryLowerMid ? ' → $'+t.currentLowerMid.toFixed(2) : ''}</div>`);
  html.push(`    </div>`);
  html.push(`    <div class="diag-pos-leg short">`);
  html.push(`      <div class="diag-pos-leg-side">−2 Short body</div>`);
  html.push(`      <div class="diag-pos-leg-strike">${t.bodyStrike}C</div>`);
  html.push(`      <div class="diag-pos-leg-meta">$${t.entryBodyMid?.toFixed(2)}${t.currentBodyMid != null && t.currentBodyMid !== t.entryBodyMid ? ' → $'+t.currentBodyMid.toFixed(2) : ''}</div>`);
  html.push(`    </div>`);
  html.push(`    <div class="diag-pos-leg long">`);
  html.push(`      <div class="diag-pos-leg-side">+1 Long upper</div>`);
  html.push(`      <div class="diag-pos-leg-strike">${t.upperStrike}C</div>`);
  html.push(`      <div class="diag-pos-leg-meta">$${t.entryUpperMid?.toFixed(2)}${t.currentUpperMid != null && t.currentUpperMid !== t.entryUpperMid ? ' → $'+t.currentUpperMid.toFixed(2) : ''}</div>`);
  html.push(`    </div>`);
  html.push(`  </div>`);
  if (t.entryDebit != null && t.currentValue != null) {
    html.push(`  <div class="diag-pos-pricing">`);
    html.push(`    <div class="diag-pos-price"><div class="diag-pos-price-label">Entry debit</div><div class="diag-pos-price-value">$${t.entryDebit.toFixed(2)}</div></div>`);
    html.push(`    <div class="diag-pos-price"><div class="diag-pos-price-label">${t.status === 'closed' ? 'Settled' : 'Current'}</div><div class="diag-pos-price-value">$${t.currentValue.toFixed(2)}</div></div>`);
    html.push(`    <div class="diag-pos-price"><div class="diag-pos-price-label">Δ vs entry</div><div class="diag-pos-price-value ${deltaClass}">${debitDelta > 0 ? '+' : ''}${debitDelta.toFixed(2)}</div></div>`);
    html.push(`  </div>`);
  }
  html.push(`</div>`);

  const ageS = t.lastQuoteAt ? Math.round((Date.now() - new Date(t.lastQuoteAt).getTime()) / 1000) : null;
  const ageStr = ageS == null ? '—' : ageS < 60 ? `${ageS}s ago` : `${Math.round(ageS/60)}m ago`;
  html.push(`<div class="diag-meta">`);
  html.push(`  <span>${statusText}</span>`);
  if (t.status === 'filled' || t.status === 'working') html.push(`  <span>Quote age: ${ageStr}</span>`);
  html.push(`</div>`);
  html.push(`</div>`);
  sec.innerHTML = html.join('');
}

// ─── Straddle trade state ─────────────────────────────────────────────────────
let straddle = null;
async function loadStraddle() {
  try {
    const r = await fetchWithRetry(PROXY + '/straddle-today', { cache: 'no-store' });
    if (r.ok) straddle = await r.json();
  } catch (e) { console.warn('[live] /straddle-today fetch failed:', e); }
}

function renderStraddle() {
  const sec = document.getElementById('straddleSection');
  if (!straddle) { sec.style.display = 'none'; return; }
  const { open, lastClosed, skip, date, isWeekend, isHoliday, serverTimeET, workCutoffET } = straddle;

  // Hide entirely on weekends + holidays unless we have a recent closed trade
  if (isWeekend || isHoliday) {
    if (!lastClosed || lastClosed.closeDate !== date) { sec.style.display = 'none'; return; }
  }

  // Don't show empty card pre-9:30 with no data
  if (!open && !(lastClosed && lastClosed.closeDate === date)) {
    sec.style.display = '';
    let badge = 'WAITING SIGNAL', badgeClass = 'pending';
    let statusLine = 'Straddle fires automatically at 9:32 ET if signal allows.';
    if (skip) {
      if (skip.theme === 'strad-missed') {
        // Signal said straddle but no working/filled trade exists yet —
        // the morning debit was above the max limit. Until workCutoffET
        // (13:30 ET) the order is conceptually still "working" (price may
        // still drop to the limit). After cutoff, declare price-not-hit.
        const [sH, sM] = (serverTimeET || '00:00').split(':').map(Number);
        const [cH, cM] = (workCutoffET || '13:30').split(':').map(Number);
        const pastCutoff = (sH * 60 + sM) >= (cH * 60 + cM);
        const strikeStr = (skip.plannedStrike != null) ? ` at strike ${skip.plannedStrike}` : '';
        const limitStr  = (skip.plannedMaxDebit != null) ? `$${skip.plannedMaxDebit.toFixed(2)}` : '';
        if (pastCutoff) {
          badge = 'NO FILL'; badgeClass = 'skip';
          statusLine = `Price target ${limitStr ? limitStr + ' ' : ''}was not hit by ${workCutoffET} ET — order canceled.`;
        } else {
          badge = 'WORKING'; badgeClass = 'pending';
          statusLine = `Working order for Straddle${strikeStr}${limitStr ? ' · limit ' + limitStr : ''} — waiting to fill, cancels at ${workCutoffET} ET.`;
        }
      } else {
        badge = 'SKIP'; badgeClass = 'skip';
        statusLine = `No Straddle today`;
      }
    }
    sec.innerHTML = `
      <div class="diag-card">
        <div class="diag-header">
          <div class="diag-title"><span>Straddle</span> · 9:32 ET</div>
          <span class="diag-badge ${badgeClass}">${badge}</span>
          <div style="flex:1"></div>
          <span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">${serverTimeET} ET</span>
        </div>
        <div style="font-size:13px;color:var(--text2);padding:6px 0;">${statusLine}</div>
      </div>`;
    return;
  }

  sec.style.display = '';
  const showTrade = open || (lastClosed && lastClosed.closeDate === date);
  const t = open || lastClosed;
  if (!t) { sec.style.display = 'none'; return; }

  // Status badge
  let badge, badgeClass, statusText;
  switch (t.status) {
    case 'filled':
      badge = 'FILLED · LIVE'; badgeClass = 'open';
      statusText = `Filled at $${t.fillDebit?.toFixed(2)} · ${t.fillTimeET || t.openTimeET} ET · max debit $${t.maxDebit?.toFixed(2)}`;
      break;
    case 'working':
      badge = 'WORKING'; badgeClass = 'pending';
      statusText = `Working limit @ $${t.maxDebit?.toFixed(2)} · current mid $${t.currentValue?.toFixed(2)} · cancels at ${workCutoffET} ET`;
      break;
    case 'expired':
      badge = 'NO FILL'; badgeClass = 'skip';
      statusText = `Order expired ${workCutoffET} ET — straddle never met max debit $${t.maxDebit?.toFixed(2)}`;
      break;
    case 'closed':
      badge = 'CLOSED'; badgeClass = t.pnl >= 0 ? 'open' : 'error';
      statusText = `Settled at SPX ${t.spxClose?.toFixed(2)} · final P&L ${fmt$(t.pnl)}`;
      break;
    default:
      badge = (t.status || 'OPEN').toUpperCase(); badgeClass = 'pending';
      statusText = `Status: ${t.status}`;
  }

  const debitDelta = (t.currentValue != null && t.entryDebit != null) ? (t.currentValue - t.entryDebit) : null;
  const deltaClass = (debitDelta == null) ? '' : debitDelta > 0 ? 'diag-pl-pos' : debitDelta < 0 ? 'diag-pl-neg' : '';

  const fmtExp = iso => {
    if (!iso) return '—';
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleString('en-US',{month:'short',day:'numeric'});
  };

  const livePnl = (t.status === 'filled')
    ? t.currentPnl
    : (t.status === 'closed') ? t.pnl : null;
  const plClass = livePnl == null ? '' : livePnl > 0 ? 'diag-pl-pos' : livePnl < 0 ? 'diag-pl-neg' : '';

  const html = [];
  html.push(`<div class="diag-card">`);
  html.push(`<div class="diag-header">`);
  html.push(`<div class="diag-title"><span>${t.badge || 'Straddle'}</span> · ${t.openTimeET || '9:32'} ET</div>`);
  html.push(`<span class="diag-badge ${badgeClass}">${badge}</span>`);
  if (t.strike != null && t.expDate) {
    window._tos.strad = `BUY +1 STRADDLE SPX 100 (Weeklys) ${tosDate(t.expDate)} ${_tk(t.strike)} @${(t.fillDebit ?? t.entryDebit ?? t.maxDebit)?.toFixed(2)} LMT`;
    html.push(tosBtn('strad'));
  }
  html.push(`<div style="flex:1"></div>`);
  html.push(`<span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">max debit $${t.maxDebit?.toFixed(2)}</span>`);
  html.push(`</div>`);

  // For closed (settled) trades, prefer spxClose (the actual close print)
  // over currentSpot (the last intraday mid-tick before close — which can be
  // 2-5 points away from the real settle). Observed 2026-05-22 where the
  // page showed currentSpot=7477 while actual SPX close was 7474.07.
  // Hoisted out of the if-block below so line ~1055 (position-card subline)
  // can also read it — was a const inside the block → ReferenceError on
  // every render. Caught 2026-05-29 on the EOM Straddle when the page
  // showed "Failed to load: stradEffSpot is not defined — try refreshing".
  const stradEffSpot = (t.status === 'closed' && t.spxClose != null) ? t.spxClose : (t.currentSpot ?? t.spxClose);

  // Stats grid (only meaningful when we have prices)
  if (t.entryDebit != null) {
    html.push(`<div class="diag-grid">`);
    if (livePnl != null) {
      html.push(`<div class="diag-stat"><div class="diag-stat-label">${t.status==='closed'?'Final':'Live'} P&L</div><div class="diag-stat-value ${plClass}">${fmt$(livePnl)}</div><div class="diag-stat-sub">${t.contracts} contract</div></div>`);
    } else {
      html.push(`<div class="diag-stat"><div class="diag-stat-label">P&L</div><div class="diag-stat-value">—</div><div class="diag-stat-sub">${t.status === 'working' ? 'pending fill' : ''}</div></div>`);
    }
    html.push(`<div class="diag-stat"><div class="diag-stat-label">SPX${t.status==='closed'?' (close)':''}</div><div class="diag-stat-value">${stradEffSpot != null ? stradEffSpot.toFixed(2) : '—'}</div><div class="diag-stat-sub">Strike ${t.strike}</div></div>`);
    html.push(`<div class="diag-stat"><div class="diag-stat-label">Entry debit</div><div class="diag-stat-value">$${(t.entryDebit*100).toFixed(0)}</div><div class="diag-stat-sub">$${t.entryDebit?.toFixed(2)} mid</div></div>`);
    if (t.currentValue != null) {
      html.push(`<div class="diag-stat"><div class="diag-stat-label">Current</div><div class="diag-stat-value">$${(t.currentValue*100).toFixed(0)}</div><div class="diag-stat-sub">${debitDelta != null ? `<span class="${deltaClass}">${debitDelta > 0 ? '+' : ''}${debitDelta.toFixed(2)}</span>` : ''}</div></div>`);
    }
    html.push(`</div>`);
  }

  // Position card
  html.push(`<div class="diag-position">`);
  html.push(`  <div class="diag-pos-title">Straddle Position · ${t.contracts || 1} contract</div>`);
  html.push(`  <div class="diag-pos-headline">SPX ${t.strike}P <span class="diag-slash">/</span> ${t.strike}C</div>`);
  html.push(`  <div class="diag-pos-subline">ATM straddle · 0DTE · spot ${t.spotEntry?.toFixed(2)}${stradEffSpot != null && stradEffSpot !== t.spotEntry ? ' → '+stradEffSpot.toFixed(2) : ''}</div>`);
  html.push(`  <div class="diag-pos-legs">`);
  html.push(`    <div class="diag-pos-leg long">`);  // calls = bought, use blue
  html.push(`      <div class="diag-pos-leg-side">Long Call · bought</div>`);
  html.push(`      <div class="diag-pos-leg-strike">${t.strike}C</div>`);
  html.push(`      <div class="diag-pos-leg-meta">${fmtExp(t.expDate)} · 0DTE · ATM</div>`);
  html.push(`    </div>`);
  html.push(`    <div class="diag-pos-leg long">`);
  html.push(`      <div class="diag-pos-leg-side">Long Put · bought</div>`);
  html.push(`      <div class="diag-pos-leg-strike">${t.strike}P</div>`);
  html.push(`      <div class="diag-pos-leg-meta">${fmtExp(t.expDate)} · 0DTE · ATM</div>`);
  html.push(`    </div>`);
  html.push(`  </div>`);
  if (t.entryDebit != null && t.currentValue != null) {
    html.push(`  <div class="diag-pos-pricing">`);
    html.push(`    <div class="diag-pos-price"><div class="diag-pos-price-label">Entry debit</div><div class="diag-pos-price-value">$${t.entryDebit.toFixed(2)}</div></div>`);
    html.push(`    <div class="diag-pos-price"><div class="diag-pos-price-label">${t.status === 'closed' ? 'Settled' : 'Current'}</div><div class="diag-pos-price-value">$${t.currentValue.toFixed(2)}</div></div>`);
    html.push(`    <div class="diag-pos-price"><div class="diag-pos-price-label">Δ vs entry</div><div class="diag-pos-price-value ${deltaClass}">${debitDelta > 0 ? '+' : ''}${debitDelta.toFixed(2)}</div></div>`);
    html.push(`  </div>`);
  }
  html.push(`</div>`);

  // Per-leg fills toggle
  if (t.entryCallMid != null) {
    html.push(`<details style="margin-top:8px;">`);
    html.push(`  <summary style="font-size:10px;color:var(--text3);cursor:pointer;text-transform:uppercase;letter-spacing:.08em;padding:4px 0;">show per-leg fills</summary>`);
    html.push(`  <div style="margin-top:6px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);">`);
    html.push(`    <div class="diag-leg"><span class="side long">CALL</span><span class="desc">${t.strike}C · ${fmtExp(t.expDate)}</span><span class="price">$${t.entryCallMid?.toFixed(2)}${t.currentCallMid != null ? ' → $'+t.currentCallMid.toFixed(2) : ''}</span></div>`);
    html.push(`    <div class="diag-leg"><span class="side long">PUT</span><span class="desc">${t.strike}P · ${fmtExp(t.expDate)}</span><span class="price">$${t.entryPutMid?.toFixed(2)}${t.currentPutMid != null ? ' → $'+t.currentPutMid.toFixed(2) : ''}</span></div>`);
    html.push(`  </div>`);
    html.push(`</details>`);
  }

  const ageS = t.lastQuoteAt ? Math.round((Date.now() - new Date(t.lastQuoteAt).getTime()) / 1000) : null;
  const ageStr = ageS == null ? '—' : ageS < 60 ? `${ageS}s ago` : `${Math.round(ageS/60)}m ago`;
  html.push(`<div class="diag-meta">`);
  html.push(`  <span>${statusText}</span>`);
  if (t.status === 'filled' || t.status === 'working') html.push(`  <span>Quote age: ${ageStr}</span>`);
  html.push(`</div>`);
  html.push(`</div>`);
  sec.innerHTML = html.join('');
}

// ─── Diagonal trade state ─────────────────────────────────────────────────────
let diagonal = null;
async function loadDiagonal() {
  try {
    const r = await fetchWithRetry(PROXY + '/diagonal-today', { cache: 'no-store' });
    if (r.ok) diagonal = await r.json();
  } catch (e) { console.warn('[live] /diagonal-today fetch failed:', e); }

// Helper: format expiry ISO as "May 8" / "Jun 12"
function _fmtDiagExp(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleString('en-US',{month:'short',day:'numeric'});
}

// Render one diagonal "panel" — used for both the held-overnight panel
// and today's-new-trade panel. `which` is 'overnight' or 'today' (drives
// labels). `trade` is either the open KV record, the lastClosed record, or null.
function _renderDiagPanel(which, trade, status, ctx) {
  const { signal, vixPct20d, date, serverTimeET } = ctx;
  const html = [];
  // For an OPEN trade, the actual close date is the next trading day after
  // the open date — bot already picked it correctly (stored in trade.shortExp,
  // e.g. Fri-open with Memorial-Day weekend → shortExp=Tue). Falling back to
  // `date` (today's calendar date) showed "MAY 22 → MAY 23" on a Saturday,
  // which is wrong — diagonal isn't closing on the weekend.
  const closeDateForTitle = trade
    ? (trade.closeDate || trade.shortExp || date)
    : null;
  // Next-diagonal placeholder: on weekend / holiday → "next trading day 12:30 ET"
  // (we don't know the exact date client-side without a server lookup, but
  // it's accurate enough). Normal days → "opens 12:30 ET".
  const nextPlaceholder = (ctx.isWeekend || ctx.isHoliday) ? 'opens next trading day · 12:30 ET' : 'opens 12:30 ET';
  const headerLabel = which === 'overnight'
    ? `<span>Current diagonal</span> · ${trade ? `${_fmtDiagExp(trade.openDate)} → ${_fmtDiagExp(closeDateForTitle)}` : 'no open trade'}`
    : `<span>Next diagonal</span> · ${trade ? `${_fmtDiagExp(trade.openDate)} → ${_fmtDiagExp(trade.shortExp || '')}` : nextPlaceholder}`;

  html.push(`<div class="diag-card">`);
  html.push(`<div class="diag-header">`);
  html.push(`<div class="diag-title">${headerLabel}</div>`);
  html.push(`<span class="diag-badge ${status.badgeClass}">${status.badge}</span>`);
  if (trade && trade.shortStrike != null && trade.longExp) {
    const dKey = `diag_${which}`;
    window._tos[dKey] = `BUY +1 DIAGONAL SPX 100 (Weeklys) ${tosDate(trade.longExp)}/${tosDate(trade.shortExp)} ${_tk(trade.longStrike)}/${_tk(trade.shortStrike)} PUT @${(trade.entryDebit)?.toFixed(2)} LMT`;
    html.push(tosBtn(dKey));
  }
  html.push(`<div style="flex:1"></div>`);
  if (which === 'today' && vixPct20d != null) html.push(`<span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">VIX 20d: ${vixPct20d}%</span>`);
  html.push(`</div>`);

  // Body — placeholder when no trade, otherwise the live/closed render
  if (!trade) {
    html.push(`<div style="font-size:13px;color:var(--text2);padding:6px 0;">${status.statusText}</div>`);
    if (which === 'today') {
      html.push(`<div style="font-size:11px;color:var(--text3);margin-top:6px;">Server time: ${serverTimeET} ET · ${date}</div>`);
    }
    html.push(`</div>`);
    return html.join('');
  }

  // Live/closed body
  const isClosed = trade.status === 'closed' || trade.pnl != null;
  const finalPnl = isClosed ? trade.pnl : trade.currentPnl;
  const plClass = (finalPnl == null) ? '' : finalPnl > 0 ? 'diag-pl-pos' : finalPnl < 0 ? 'diag-pl-neg' : '';

  html.push(`<div class="diag-grid">`);
  if (isClosed) {
    html.push(`  <div class="diag-stat"><div class="diag-stat-label">Final P&L</div><div class="diag-stat-value ${plClass}">${fmt$(trade.pnl)}</div><div class="diag-stat-sub">${trade.openDate} → ${trade.closeDate}</div></div>`);
    html.push(`  <div class="diag-stat"><div class="diag-stat-label">Entry → Exit</div><div class="diag-stat-value">${trade.spotEntry?.toFixed(0)} → ${trade.spotExit?.toFixed(0)}</div><div class="diag-stat-sub">${trade.spotExit != null && trade.spotEntry != null ? (trade.spotExit-trade.spotEntry).toFixed(2) : '—'} pts</div></div>`);
    html.push(`  <div class="diag-stat"><div class="diag-stat-label">Debit → Close value</div><div class="diag-stat-value">$${(trade.entryDebit*100).toFixed(0)} → $${(trade.closeValue*100).toFixed(0)}</div></div>`);
  } else {
    const move = trade.currentSpot != null && trade.spotEntry != null
      ? (trade.currentSpot - trade.spotEntry).toFixed(2) : '—';
    html.push(`  <div class="diag-stat"><div class="diag-stat-label">Live P&L</div><div class="diag-stat-value ${plClass}">${fmt$(trade.currentPnl)}</div><div class="diag-stat-sub">${trade.contracts || 1} contract</div></div>`);
    html.push(`  <div class="diag-stat"><div class="diag-stat-label">SPX Now</div><div class="diag-stat-value">${trade.currentSpot != null ? trade.currentSpot.toFixed(2) : '—'}</div><div class="diag-stat-sub">Entry ${trade.spotEntry?.toFixed(2)} · ${move > 0 ? '+' : ''}${move}</div></div>`);
    html.push(`  <div class="diag-stat"><div class="diag-stat-label">Debit Paid</div><div class="diag-stat-value">$${(trade.entryDebit*100).toFixed(0)}</div><div class="diag-stat-sub">Mid ${trade.entryDebit?.toFixed(2)}</div></div>`);
    html.push(`  <div class="diag-stat"><div class="diag-stat-label">Current Value</div><div class="diag-stat-value">${trade.currentValue != null ? '$'+(trade.currentValue*100).toFixed(0) : '—'}</div><div class="diag-stat-sub">${trade.currentValue != null ? 'Mid '+trade.currentValue.toFixed(2) : ''}</div></div>`);
  }
  html.push(`</div>`);

  // Position card
  const debitDelta = (trade.currentValue != null && trade.entryDebit != null)
    ? (trade.currentValue - trade.entryDebit) : null;
  const deltaClass = debitDelta == null ? '' : debitDelta > 0 ? 'diag-pl-pos' : debitDelta < 0 ? 'diag-pl-neg' : '';
  html.push(`<div class="diag-position">`);
  html.push(`  <div class="diag-pos-title">Diagonal Position · ${trade.contracts || 1} contract${isClosed ? ' · CLOSED' : ''}</div>`);
  html.push(`  <div class="diag-pos-headline">SPX ${trade.shortStrike}P <span class="diag-slash">/</span> ${trade.longStrike}P</div>`);
  html.push(`  <div class="diag-pos-subline">put diagonal · 40-wide · spot ${trade.spotEntry?.toFixed(2)}${trade.currentSpot != null && !isClosed ? ' → '+trade.currentSpot.toFixed(2) : ''}${isClosed && trade.spotExit != null ? ' → '+trade.spotExit.toFixed(2) : ''}</div>`);
  html.push(`  <div class="diag-pos-legs">`);
  html.push(`    <div class="diag-pos-leg short">`);
  html.push(`      <div class="diag-pos-leg-side">Short · sold</div>`);
  html.push(`      <div class="diag-pos-leg-strike">${trade.shortStrike}P</div>`);
  html.push(`      <div class="diag-pos-leg-meta">${_fmtDiagExp(trade.shortExp)} · ${trade.shortDte} DTE · 30 ITM</div>`);
  html.push(`    </div>`);
  html.push(`    <div class="diag-pos-leg long">`);
  html.push(`      <div class="diag-pos-leg-side">Long · bought</div>`);
  html.push(`      <div class="diag-pos-leg-strike">${trade.longStrike}P</div>`);
  html.push(`      <div class="diag-pos-leg-meta">${_fmtDiagExp(trade.longExp)} · ${trade.longDte} DTE · 10 OTM</div>`);
  html.push(`    </div>`);
  html.push(`  </div>`);
  if (trade.entryDebit != null && (trade.currentValue != null || trade.closeValue != null)) {
    const valueShown = isClosed ? trade.closeValue : trade.currentValue;
    html.push(`  <div class="diag-pos-pricing">`);
    html.push(`    <div class="diag-pos-price"><div class="diag-pos-price-label">Entry debit</div><div class="diag-pos-price-value">$${trade.entryDebit?.toFixed(2)}</div></div>`);
    html.push(`    <div class="diag-pos-price"><div class="diag-pos-price-label">${isClosed ? 'Close value' : 'Current'}</div><div class="diag-pos-price-value">$${valueShown?.toFixed(2)}</div></div>`);
    html.push(`    <div class="diag-pos-price"><div class="diag-pos-price-label">Δ vs entry</div><div class="diag-pos-price-value ${deltaClass}">${debitDelta != null ? (debitDelta > 0 ? '+' : '')+debitDelta.toFixed(2) : '—'}</div></div>`);
    html.push(`  </div>`);
  }
  html.push(`</div>`);

  // Per-leg fills (only on live trades — closed trades shown via stat grid)
  if (!isClosed && trade.entryShortMid != null) {
    html.push(`<details style="margin-top:8px;">`);
    html.push(`  <summary style="font-size:10px;color:var(--text3);cursor:pointer;text-transform:uppercase;letter-spacing:.08em;padding:4px 0;">show per-leg fills</summary>`);
    html.push(`  <div style="margin-top:6px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);">`);
    html.push(`    <div class="diag-leg"><span class="side short">SHORT</span><span class="desc">${trade.shortStrike}P · ${_fmtDiagExp(trade.shortExp)} · ${trade.shortDte}DTE</span><span class="price">$${trade.entryShortMid?.toFixed(2)} → $${trade.currentShortMid?.toFixed(2)}</span></div>`);
    html.push(`    <div class="diag-leg"><span class="side long">LONG</span><span class="desc">${trade.longStrike}P · ${_fmtDiagExp(trade.longExp)} · ${trade.longDte}DTE</span><span class="price">$${trade.entryLongMid?.toFixed(2)} → $${trade.currentLongMid?.toFixed(2)}</span></div>`);
    html.push(`  </div>`);
    html.push(`</details>`);
  }

  // Footer meta
  if (!isClosed) {
    const ageS = trade.lastQuoteAt ? Math.max(0, Math.round((Date.now() - new Date(trade.lastQuoteAt).getTime()) / 1000)) : null;
    const ageStr = ageS == null ? '—' : ageS < 60 ? `${ageS}s ago` : `${Math.round(ageS/60)}m ago`;
    html.push(`<div class="diag-meta">`);
    html.push(`  <span>${status.statusText}</span>`);
    html.push(`  <span>Quote age: ${ageStr}</span>`);
    html.push(`  <span>Closes ~12:30 ET on ${_fmtDiagExp(trade.shortExp)}</span>`);
    html.push(`</div>`);
  } else {
    html.push(`<div class="diag-meta"><span>${status.statusText}</span><span>Strikes: ${trade.shortStrike}/${trade.longStrike}P</span></div>`);
  }
  html.push(`</div>`);
  return html.join('');
}

function renderDiagonal() {
  const sec = document.getElementById('diagonalSection');
  if (!diagonal) { sec.style.display = 'none'; return; }
  sec.style.display = '';

  const { open, lastClosed, signal, vixPct20d, date, isWeekend, isHoliday, serverTimeET } = diagonal;
  const ctx = { signal, vixPct20d, date, serverTimeET, isWeekend, isHoliday };

  // Split data into two panels:
  //   overnightTrade — held trade, opened a prior session, closes/closed at
  //                    today's 12:30 ET. Pre-12:30 → still in `open`.
  //                    Post-12:30 → in `lastClosed` with closeDate=today.
  //   todaysTrade    — newly opened today at 12:30 ET (`open` with
  //                    openDate=today). Pre-12:30 → null (placeholder).
  let overnightTrade = null, todaysTrade = null;
  if (open && open.openDate === date) {
    // open trade was opened TODAY → it's the new one
    todaysTrade = open;
    // The held-overnight from yesterday is already closed → lastClosed
    if (lastClosed && lastClosed.closeDate === date) overnightTrade = lastClosed;
  } else if (open && open.openDate < date) {
    // open trade is from a prior session → it's the held-overnight one
    overnightTrade = open;
  }
  // Edge case: only lastClosed (e.g. weekend lookback)
  if (!overnightTrade && !todaysTrade && lastClosed && lastClosed.closeDate === date) {
    overnightTrade = lastClosed;
  }

  // Status for each panel
  const overnightStatus = (() => {
    if (!overnightTrade) return null;
    const isClosed = overnightTrade.status === 'closed' || overnightTrade.pnl != null;
    if (isClosed) {
      return {
        badge: 'CLOSED', badgeClass: overnightTrade.pnl > 0 ? 'open' : overnightTrade.pnl < 0 ? 'error' : 'skip',
        statusText: `Closed at 12:30 ET · final P&L ${fmt$(overnightTrade.pnl)}`,
      };
    }
    // OPEN trade: actually closes on trade.shortExp (next trading day after
    // open — bot picked Tuesday after Memorial Day weekend, etc.). If today
    // isn't a trading day (weekend / holiday) OR shortExp is later than
    // today, the diagonal is HELD, not closing today.
    const closeISO = overnightTrade.shortExp || date;
    const closesToday = !isWeekend && !isHoliday && closeISO === date;
    if (closesToday) {
      return {
        badge: 'LIVE · CLOSING TODAY', badgeClass: 'open',
        statusText: `Held trade — closes at 12:30 ET today, then today's diagonal opens.`,
      };
    }
    return {
      badge: `LIVE · HELD · CLOSES ${_fmtDiagExp(closeISO)}`, badgeClass: 'open',
      statusText: `Held over ${isWeekend ? 'weekend' : isHoliday ? 'market holiday' : 'non-trading day'} — closes at 12:30 ET on ${_fmtDiagExp(closeISO)}.`,
    };
  })();

  const todaysStatus = (() => {
    if (todaysTrade) {
      return {
        badge: 'OPEN', badgeClass: 'open',
        statusText: `Trade live · entered ${todaysTrade.openTimeET || ''} ET`,
      };
    }
    if (isWeekend || isHoliday) {
      return { badge: 'CLOSED', badgeClass: 'skip', statusText: isWeekend ? 'Market closed (weekend)' : 'Market closed (holiday)' };
    }
    if (signal && signal.diagSkipCode) {
      return { badge: 'SKIP', badgeClass: 'skip', statusText: signal.diagText };
    }
    if (signal && signal.diagGo === false && signal.diagBadge === '…') {
      return { badge: 'PENDING', badgeClass: 'pending', statusText: signal.diagText };
    }
    if (signal && signal.diagGo) {
      return { badge: 'WAITING 12:30 ET', badgeClass: 'pending', statusText: `${signal.diagText}. Trade auto-opens at 12:30 ET if signal still allows.` };
    }
    return { badge: '—', badgeClass: 'skip', statusText: 'No diagonal data' };
  })();

  const html = [];
  if (overnightTrade && overnightStatus) html.push(_renderDiagPanel('overnight', overnightTrade, overnightStatus, ctx));
  html.push(_renderDiagPanel('today', todaysTrade, todaysStatus, ctx));
  sec.innerHTML = html.join('');
}

// ─── SPX Live Data ────────────────────────────────────────────────────────────
// The Windows machine writes spx_live.json every 60s. We poll it here.
let lastSpxTimestamp = null;

async function refreshSPX() {
  // Primary: worker /spx-history (live Schwab ticks, written every cron tick by
  // schwab-proxy.js — replaces the dead Windows-machine→spx_live.json pipeline).
  // Returns {date, data:[{time, price}, ...]}. Last element is the latest tick.
  try {
    const r = await fetchWithRetry(PROXY + '/spx-history', { cache: 'no-store' });
    if (r.ok) {
      const d = await r.json();
      const ticks = d?.data || [];
      const last = ticks[ticks.length - 1];
      if (last && last.price && d.date) {
        const nowET = getNowET();
        const [dy, dmo, dd] = d.date.split('-').map(Number);
        const sameDay = (nowET.getFullYear() === dy && (nowET.getMonth()+1) === dmo && nowET.getDate() === dd);
        // Freshness: the tick's OWN time must be recent — sameDay alone renders a
        // frozen feed as "live" with a green badge (audit P1-i 2026-07-06). Reject
        // if the last tick is > 5 min old; the tick carries {time:'HH:MM'}.
        let fresh = sameDay;
        if (sameDay && last.time) {
          const [th, tm] = String(last.time).split(':').map(Number);
          if (Number.isFinite(th) && Number.isFinite(tm)) {
            const ageSecs = (nowET.getHours() * 60 + nowET.getMinutes() - th * 60 - tm) * 60;
            if (ageSecs > 300) fresh = false;
          }
        }
        if (fresh) {
          spxPrice = last.price;
          lastSpxTimestamp = Date.now();
          schwabConnected = true;
          return true;
        }
        schwabConnected = false;   // stale → fall through to the GH-raw fallback (own age check)
      }
    }
  } catch (e) { console.warn('[live] spx worker fetch failed, falling back to GH raw:', e); }

  // Fallback: legacy spx_live.json on GitHub raw (Windows-machine pipeline, may
  // be stale if that machine isn't running).
  try {
    const r = await fetchWithRetry(RAW + 'spx_live.json?v=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) return false;
    const data = await r.json();
    if (!data.price) return false;

    // Check freshness BEFORE setting price — don't show stale data
    if (data.time && data.date) {
      const nowET = getNowET();
      const [dh, dm] = data.time.split(':').map(Number);
      const [dy, dmo, dd] = data.date.split('-').map(Number);
      const sameDay = (nowET.getFullYear() === dy && (nowET.getMonth()+1) === dmo && nowET.getDate() === dd);
      if (!sameDay) { schwabConnected = false; return false; }
      const ageSecs = (nowET.getHours() * 60 + nowET.getMinutes() - dh * 60 - dm) * 60;
      if (ageSecs > 300) { schwabConnected = false; return false; }
    }

    spxPrice = data.price;
    spxPrevClose = data.prev_close;
    lastSpxTimestamp = Date.now();
    schwabConnected = true;
    return true;
  } catch {
    schwabConnected = false;
    return false;
  }
}

// ─── UI Helpers ──────────────────────────────────────────────────────────────
function fmt$(n) {
  if (n === null || n === undefined) return '—';
  const s = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return (n >= 0 ? '+$' : '-$') + s;
}
function fmtSpx(n) {
  if (!n) return '—';
  return n.toFixed(2);
}
function plClass(pl) {
  if (pl === null || pl === undefined) return '';
  return pl >= 0 ? 'green' : 'red';
}
function timeLabel() {
  return getNowET().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}

function rebuildChart() {
  if (!plChart) return;
  plChart.data.labels = plHistory.map(p => p.time);
  plChart.data.datasets[0].data = plHistory.map(p => p.pl);
  plChart.data.datasets[1].data = plHistory.map(() => 0);
  const last = plHistory[plHistory.length - 1];
  if (last) {
    plChart.data.datasets[0].borderColor = last.pl >= 0 ? '#4ade80' : '#f87171';
    plChart.data.datasets[0].backgroundColor = last.pl >= 0 ? 'rgba(74,222,128,.08)' : 'rgba(248,113,113,.08)';
  }
  plChart.update();
}

// ─── Today's Total Live P&L (left-side fixed panel) ──────────────────────────
// Sums P&L from each strategy active today. Diagonal counts on its CLOSE date
// only (so the May-N → May-(N+1) trade is included in May-(N+1)'s total).
// A diagonal that OPENED today is excluded from this combined total — it'll
// show up in next trading day's total when it closes. It still renders in its
// own dedicated Diagonal card on the page, just not here.
function renderLiveTotal() {
  const sec = document.getElementById('liveTotalSection');
  if (!sec) return;
  const nowET = getNowET();
  const today = `${nowET.getFullYear()}-${String(nowET.getMonth()+1).padStart(2,'0')}-${String(nowET.getDate()).padStart(2,'0')}`;

  // M8BF
  let m8bfPL = null;
  if (trade && trade.triggered && trade.date === today) {
    if (trade.status === 'closed' && trade.final_pl != null) m8bfPL = trade.final_pl;
    else { const _p = m8bfLivePL(trade, spxPrice); if (_p !== null) m8bfPL = _p; }
  }

  // BOBF — live open on today, or closed earlier today
  let bobfPL = null;
  const bobfOpen = bobf?.open;
  const bobfLast = bobf?.lastClosed;
  if (bobfOpen?.openDate === today && bobfOpen.currentPnl != null) bobfPL = bobfOpen.currentPnl;
  else if (bobfLast?.openDate === today && bobfLast.pnl != null) bobfPL = bobfLast.pnl;

  // GXBF — same pattern as BOBF (own trade object; strategy-independent)
  let gxbfPL = null;
  const gxbfOpen = gxbf?.open;
  const gxbfLast = gxbf?.lastClosed;
  if (gxbfOpen?.openDate === today && gxbfOpen.currentPnl != null) gxbfPL = gxbfOpen.currentPnl;
  else if (gxbfLast?.openDate === today && gxbfLast.pnl != null) gxbfPL = gxbfLast.pnl;

  // Straddle — same pattern
  let stradPL = null;
  const stradOpen = straddle?.open;
  const stradLast = straddle?.lastClosed;
  if (stradOpen?.openDate === today && stradOpen.currentPnl != null) stradPL = stradOpen.currentPnl;
  else if (stradLast?.openDate === today && stradLast.pnl != null) stradPL = stradLast.pnl;

  // Diagonal — only counts on its CLOSE date (the day it settles).
  // A diagonal opened TODAY is excluded from the combined card: it'll
  // show up tomorrow when it closes. This matches the historical record
  // (diagPL commits on closeDate, so the backtest counts it once) and
  // matches how diagonals contribute to the live total naturally —
  // a fresh open at 12:30 ET has near-zero P&L until time passes.
  //   • Pre-12:30 ET:  yesterday's open diagonal is live → show its currentPnl
  //   • Post-12:30 ET: yesterday's diagonal has closed today → show its realized pnl
  //   • Today's brand-new open (openDate === today) → EXCLUDED (shows in its
  //     own card on the page, just not in this combined total)
  let diagPL = null;
  const diagOpen = diagonal?.open;
  const diagLast = diagonal?.lastClosed;
  if (diagLast?.closeDate === today && diagLast.pnl != null) {
    diagPL = diagLast.pnl;                                  // realized: opened yesterday, closed today
  } else if (diagOpen?.openDate && diagOpen.openDate < today && diagOpen.currentPnl != null) {
    diagPL = diagOpen.currentPnl;                           // live: opened yesterday, still open, closes today
  }
  // else: diagOpen.openDate === today → brand-new open today, excluded

  // Tail Hedge — now a real auto-traded strategy; include it like the others
  // (filled → live currentPnl; settled today → realized pnl). (audit 2026-06-22)
  let tailPL = null;
  const tOpen = (tail?.open && tail.open.openDate === today && tail.open.status === 'filled') ? tail.open : null;
  const tClosed = (tail?.lastClosed && tail.lastClosed.closeDate === today) ? tail.lastClosed : null;
  if (tClosed && tClosed.pnl != null) tailPL = tClosed.pnl;
  else if (tOpen && tOpen.currentPnl != null) tailPL = tOpen.currentPnl;

  const parts = [
    { name: 'M8BF',     pl: m8bfPL },
    { name: 'BOBF',     pl: bobfPL },
    { name: 'GXBF',     pl: gxbfPL },
    { name: 'Straddle', pl: stradPL },
    { name: 'Diagonal', pl: diagPL  },
    { name: 'Tail',     pl: tailPL  },
  ];
  const total = parts.reduce((s, p) => s + (p.pl ?? 0), 0);
  const anyData = parts.some(p => p.pl != null);
  const totalCls = !anyData ? '' : total > 0 ? 'diag-pl-pos' : total < 0 ? 'diag-pl-neg' : '';

  const rowsHtml = parts.map(p => {
    const cls = p.pl == null ? '' : p.pl > 0 ? 'diag-pl-pos' : p.pl < 0 ? 'diag-pl-neg' : '';
    return `<div class="ltc-row"><span class="ltc-name">${p.name}</span><span class="ltc-pl ${cls}">${p.pl == null ? '—' : fmt$(p.pl)}</span></div>`;
  }).join('');

  sec.innerHTML = `
    <div class="diag-card">
      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:baseline;margin-bottom:6px;">
        <span class="ltc-label" style="margin-bottom:0;">Today's Live P&amp;L</span>
        <span style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text);">${spxPrice != null ? 'SPX ' + fmtSpx(spxPrice) : ''}</span>
        <span></span>
      </div>
      <div class="ltc-total ${totalCls}">${anyData ? fmt$(total) : '—'}</div>
      <div class="ltc-rows">${rowsHtml}</div>
    </div>
  `;
}
