name = "schwab-proxy"
main = "schwab-proxy.js"
compatibility_date = "2026-03-17"

[triggers]
# Every 1 min during market hours (DST pair), EOD ~16:05 ET (DST pair)
crons = [
  "* 13-20 * * 1-5",
  "5 20 * * 1-5",
  "5 21 * * 1-5"
]

[[kv_namespaces]]
binding = "SIGNAL_KV"
id = "be47dd5d2fb34ec79e5a34f0e241f125"
