name = "schwab-proxy"
main = "schwab-proxy.js"
compatibility_date = "2026-03-17"

[triggers]
# DST-safe pairs: morning open ~9:31 ET, EOD close ~16:05 ET
# Morning: 13:31 UTC (EDT) / 14:31 UTC (EST)
# EOD:     20:05 UTC (EDT) / 21:05 UTC (EST)
crons = ["31 13 * * 1-5", "31 14 * * 1-5", "5 20 * * 1-5", "5 21 * * 1-5"]

[[kv_namespaces]]
binding = "SIGNAL_KV"
id = "be47dd5d2fb34ec79e5a34f0e241f125"
