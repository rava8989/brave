name = "schwab-proxy"
main = "schwab-proxy.js"
compatibility_date = "2026-03-17"

[triggers]
# Morning signal: dedicated 9:30 ET tick (EDT + EST)
# Market hours: every 1 min for GEX + Discord poll + BOBF entry checks (EDT + EST)
# EOD: ~16:17 ET (EDT + EST)
crons = [
  "30 13 * * 1-5",
  "30 14 * * 1-5",
  "* 13-20 * * 1-5",
  "17 20 * * 1-5",
  "17 21 * * 1-5",
  "0 22 * * SUN"
]

[[kv_namespaces]]
binding = "SIGNAL_KV"
id = "be47dd5d2fb34ec79e5a34f0e241f125"

# DISCORD_TOKEN (secret) replaces the standalone discord-proxy worker.
# Set via: npx wrangler secret put DISCORD_TOKEN
# When DISCORD_TOKEN is present, sendDiscordDM bypasses the service binding
# and posts DMs directly. The binding below is kept as a fallback until the
# standalone discord-proxy worker is retired.

[[services]]
binding = "DISCORD_PROXY"
service = "discord-proxy"
