name = "schwab-proxy"
main = "schwab-proxy.js"
compatibility_date = "2026-03-17"

[triggers]
# Morning open ~9:31 ET (DST pair), then Discord poll every 30min 11:00-15:30 ET, EOD ~16:05 ET (DST pair)
crons = [
  "31 13 * * 1-5",
  "31 14 * * 1-5",
  "0,30 15,16,17,18,19 * * 1-5",
  "5 20 * * 1-5",
  "5 21 * * 1-5"
]

[[kv_namespaces]]
binding = "SIGNAL_KV"
id = "be47dd5d2fb34ec79e5a34f0e241f125"
